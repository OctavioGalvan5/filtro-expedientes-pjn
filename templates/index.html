<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caja de Abogados — Salta · PJN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    [x-cloak] { display: none !important; }

    :root {
      --brand:       #0C4566;
      --brand-mid:   #125E85;
      --brand-dim:   #EEF5FA;
      --brand-dim2:  #dbeafe;
      --bg:          #F2F5F8;
      --bg-card:     #ffffff;
      --bg-input:    #f8fafc;
      --border:      #E2E8F0;
      --border-dark: #CBD5E1;
      --text-1:      #0F172A;
      --text-2:      #475569;
      --text-3:      #94A3B8;
      --green:       #059669;
      --green-dim:   #ECFDF5;
      --red:         #DC2626;
      --red-dim:     #FEF2F2;
      --amber:       #D97706;
      --amber-dim:   #FEF3C7;
      --shadow:      0 1px 3px rgba(0,0,0,.02), 0 4px 12px rgba(12,69,102,.06);
      --shadow-md:   0 4px 20px rgba(12,69,102,.10), 0 1px 4px rgba(0,0,0,.03);
      --shadow-lg:   0 8px 40px rgba(12,69,102,.14), 0 2px 8px rgba(0,0,0,.04);
      --radius:      10px;
    }

    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text-1); font-family: 'Inter', sans-serif; font-size: 14px; }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #c8cdd8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-dark); }

    /* ── Animations ────────────────────────────────────────────────────── */
    @keyframes card-in   { from { opacity:0; transform:translateY(8px)  } to { opacity:1; transform:none } }
    @keyframes row-in    { from { opacity:0; transform:translateY(4px)  } to { opacity:1; transform:none } }
    @keyframes modal-in  { from { opacity:0; transform:scale(.96) translateY(8px) } to { opacity:1; transform:none } }
    @keyframes overlay-in{ from { opacity:0 } to { opacity:1 } }
    @keyframes login-in  { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:none } }
    @keyframes spin      { to   { transform:rotate(360deg) } }
    .spinner { animation: spin .6s linear infinite; }

    /* ── App shell ─────────────────────────────────────────────────────── */
    .app-shell { display:flex; height:100vh; overflow:hidden; }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      box-shadow: 2px 0 8px rgba(12,69,102,.04);
    }
    .sidebar-logo {
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo-icon {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--brand), var(--brand-mid));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(12,69,102,.3);
    }
    .sidebar-logo-text .name { font-weight: 700; font-size: .82rem; color: var(--text-1); line-height: 1.2; }
    .sidebar-logo-text .sub  { font-size: .68rem; color: var(--brand); font-weight: 500; margin-top: 1px; }

    .nav-section-label {
      padding: 14px 16px 6px;
      font-size: .62rem; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: .8px;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; margin: 1px 8px; border-radius: 7px;
      font-size: .8rem; font-weight: 500; color: var(--text-2);
      cursor: pointer; border: none; background: transparent;
      width: calc(100% - 16px); text-align: left;
      transition: background 140ms, color 140ms;
    }
    .nav-btn:hover { background: var(--brand-dim); color: var(--brand); }
    .nav-btn.active {
      background: linear-gradient(90deg, var(--brand-dim), #e0edf5);
      color: var(--brand); font-weight: 600;
      box-shadow: inset 3px 0 0 var(--brand);
    }
    .nav-btn svg { flex-shrink: 0; opacity: .8; }

    .sidebar-footer {
      margin-top: auto; padding: 12px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .user-chip {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-radius: var(--radius);
      background: var(--bg); border: 1px solid var(--border);
    }
    .user-chip .u-name  { font-size: .78rem; font-weight: 600; color: var(--text-1); }
    .user-chip .u-role  { font-size: .67rem; color: var(--text-3); margin-top: 1px; }
    .btn-logout {
      border: none; background: none; cursor: pointer; padding: 4px 6px; border-radius: 6px;
      color: var(--text-3); transition: color 140ms, background 140ms;
    }
    .btn-logout:hover { color: var(--red); background: var(--red-dim); }
    .btn-refresh {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 7px; border: 1px solid var(--border);
      background: var(--bg-input); color: var(--text-2); font-size: .78rem; font-weight: 500;
      cursor: pointer; transition: all 140ms; width: 100%;
    }
    .btn-refresh:hover { background: var(--brand-dim); border-color: #a5c8db; color: var(--brand); }
    .btn-refresh:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Main content ──────────────────────────────────────────────────── */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── App Header (top bar) ──────────────────────────────────────────── */
    .app-header {
      background: var(--brand);
      padding: 0 28px;
      height: 56px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 16px rgba(12,69,102,.2);
      z-index: 10;
    }
    .app-header .title-block .title { font-size: .88rem; font-weight: 700; color: #fff; letter-spacing: .3px; }
    .app-header .title-block .sub   { font-size: .7rem; color: rgba(255,255,255,.55); margin-top: 1px; }
    .header-stats { display:flex; align-items:center; gap: 6px; }
    .h-stat {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 7px;
      background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.13);
    }
    .h-stat .s-num  { font-size: .9rem; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
    .h-stat .s-lbl  { font-size: .65rem; color: rgba(255,255,255,.55); margin-top: 1px; white-space: nowrap; }
    .h-divider { width: 1px; height: 20px; background: rgba(255,255,255,.18); margin: 0 4px; }

    /* ── Stats Cards ───────────────────────────────────────────────────── */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      box-shadow: var(--shadow); cursor: pointer;
      transition: box-shadow 160ms, border-color 160ms, transform 160ms;
      animation: card-in 350ms cubic-bezier(.23,1,.32,1) both;
    }
    .stat-card:nth-child(2) { animation-delay: 50ms; }
    .stat-card:nth-child(3) { animation-delay: 100ms; }
    .stat-card:nth-child(4) { animation-delay: 150ms; }
    .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .stat-card.ring-brand { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(12,69,102,.1); }
    .stat-card.ring-green { border-color: var(--green); box-shadow: 0 0 0 3px rgba(5,150,105,.1); }
    .stat-card.ring-red   { border-color: var(--red);   box-shadow: 0 0 0 3px rgba(220,38,38,.1); }
    .stat-card.ring-amber { border-color: var(--amber);  box-shadow: 0 0 0 3px rgba(217,119,6,.1); }
    .stat-card .s-num { font-size: 1.75rem; font-weight: 800; line-height: 1; color: var(--text-1); }
    .stat-card .s-lbl { font-size: .68rem; color: var(--text-3); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .s-bar { height: 3px; border-radius: 99px; margin-top: 10px; background: var(--border); overflow: hidden; }
    .stat-card .s-bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

    /* ── Badges ────────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 99px; font-size: .73rem; font-weight: 600; border: 1px solid;
    }
    .badge-si  { background: var(--green-dim); color: var(--green);  border-color: #86efac; }
    .badge-no  { background: var(--red-dim);   color: var(--red);    border-color: #fca5a5; }
    .badge-err { background: var(--amber-dim); color: var(--amber);  border-color: #fde68a; }

    .pill { display:inline-block; padding: 2px 7px; border-radius: 5px; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
    .pill-actor    { background:rgba(29,78,216,.1);  color:#1d4ed8; }
    .pill-demandado{ background:rgba(220,38,38,.1);  color:#b91c1c; }
    .pill-tercero  { background:rgba(124,58,237,.1); color:#6d28d9; }
    .pill-otro     { background:rgba(148,163,184,.15); color:#475569; }

    /* ── Inputs / Selects ──────────────────────────────────────────────── */
    .inp {
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 7px 11px;
      font-family: 'Inter', sans-serif; font-size: .82rem; color: var(--text-1);
      outline: none; transition: border-color 150ms, box-shadow 150ms, background 150ms;
    }
    .inp::placeholder { color: var(--text-3); }
    .inp:focus { border-color: var(--brand); background: #fff; box-shadow: 0 0 0 3px rgba(12,69,102,.1); }
    select.inp { cursor: pointer; }
    .flex-row { display: flex; gap: 8px; align-items: center; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: var(--radius);
      font-family: 'Inter', sans-serif; font-size: .78rem; font-weight: 500;
      cursor: pointer; border: 1px solid transparent;
      transition: all 160ms cubic-bezier(.23,1,.32,1);
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary {
      background: var(--brand); color: #fff; border-color: var(--brand);
      box-shadow: 0 1px 4px rgba(12,69,102,.3);
    }
    .btn-primary:hover:not(:disabled) { background: #072C41; box-shadow: 0 3px 10px rgba(12,69,102,.45); }
    .btn-success {
      background: var(--green-dim); color: var(--green); border-color: #86efac;
    }
    .btn-success:hover { background: #d1fae5; }
    .btn-danger  {
      background: var(--red-dim); color: var(--red); border-color: #fca5a5;
    }
    .btn-danger:hover  { background: #fee2e2; }
    .btn-ghost  {
      background: var(--bg-input); color: var(--text-2); border-color: var(--border);
    }
    .btn-ghost:hover  { background: var(--brand-dim); border-color: #a5c8db; color: var(--brand); }
    .btn-sm { padding: 5px 11px; font-size: .73rem; }

    /* ── Section / Card headers ────────────────────────────────────────── */
    .section-header {
      background: linear-gradient(90deg, var(--brand), var(--brand-mid));
      color: #fff; padding: 10px 18px; font-size: .73rem; font-weight: 600;
      letter-spacing: .6px; text-transform: uppercase;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      overflow: hidden; animation: card-in 350ms cubic-bezier(.23,1,.32,1) both;
    }

    /* ── Filters bar ───────────────────────────────────────────────────── */
    .filters-bar {
      padding: 12px 20px; background: var(--bg);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* ── Table ─────────────────────────────────────────────────────────── */
    .tbl-wrap { overflow-y: auto; flex: 1; }
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl thead th {
      background: linear-gradient(135deg, var(--brand), var(--brand-mid));
      color: #d8eaf3; font-size: .65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .6px;
      padding: 10px 14px; position: sticky; top: 0; z-index: 5;
      border-bottom: 1px solid #08324a;
      white-space: nowrap;
    }
    .tbl thead th:first-child { padding-left: 20px; }
    .tbl tbody tr {
      border-bottom: 1px solid #edf0f4;
      transition: background 120ms;
      animation: row-in 280ms cubic-bezier(.23,1,.32,1) both;
    }
    .tbl tbody tr:nth-child(even) { background: #fafafa; }
    .tbl tbody tr:hover { background: #eff6ff !important; }
    .tbl tbody tr.selected { background: #eff6ff !important; }
    .tbl tbody td { padding: 9px 14px; color: var(--text-1); vertical-align: middle; }
    .tbl tbody td:first-child { padding-left: 20px; }

    /* Row animation stagger */
    .tbl tbody tr:nth-child(1)  { animation-delay: 0ms   }
    .tbl tbody tr:nth-child(2)  { animation-delay: 25ms  }
    .tbl tbody tr:nth-child(3)  { animation-delay: 48ms  }
    .tbl tbody tr:nth-child(4)  { animation-delay: 68ms  }
    .tbl tbody tr:nth-child(5)  { animation-delay: 85ms  }
    .tbl tbody tr:nth-child(6)  { animation-delay: 100ms }
    .tbl tbody tr:nth-child(7)  { animation-delay: 113ms }
    .tbl tbody tr:nth-child(8)  { animation-delay: 124ms }
    .tbl tbody tr:nth-child(n+9){ animation-delay: 130ms }

    /* ── Pagination ────────────────────────────────────────────────────── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 20px; border-top: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .pagination .info { font-size: .73rem; color: var(--text-3); }
    .pg-btn {
      padding: 5px 13px; font-size: .73rem; font-weight: 500;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg-card); color: var(--text-2); cursor: pointer;
      transition: all 140ms;
    }
    .pg-btn:hover:not(:disabled) { background: var(--brand-dim); border-color: #a5c8db; color: var(--brand); }
    .pg-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Assignment bar ────────────────────────────────────────────────── */
    .assign-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px; background: #eff6ff;
      border-bottom: 1px solid #bfdbfe; flex-shrink: 0;
    }
    .assign-bar .a-label { font-size: .75rem; font-weight: 600; color: var(--brand); }
    .assign-bar .a-link  { font-size: .73rem; color: var(--brand-mid); text-decoration: underline; cursor: pointer; }
    .assign-bar .a-link:hover { color: var(--brand); }

    /* ── Detail page ───────────────────────────────────────────────────── */
    .detail-page { flex:1; overflow-y: auto; background: var(--bg); padding: 24px 28px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .info-row { display:flex; gap: 8px; font-size: .78rem; align-items: flex-start; }
    .info-label { font-size: .63rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; width: 88px; flex-shrink:0; padding-top: 1px; }
    .info-val { color: var(--text-1); }

    /* ── Panel right (abogados) ────────────────────────────────────────── */
    .panel-right {
      border-left: 1px solid var(--border); background: var(--bg-card);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Users page ────────────────────────────────────────────────────── */
    .users-page { flex:1; overflow-y: auto; background: var(--bg); padding: 24px 28px; }

    /* ── Login ─────────────────────────────────────────────────────────── */
    .login-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,.04) 1px, transparent 0),
        linear-gradient(135deg, #062329 0%, #0d4e5c 50%, #0C4566 100%);
      background-size: 28px 28px, 100% 100%;
    }
    .login-box {
      width: 100%; max-width: 400px; margin: 20px;
      background: var(--bg-card); border-radius: 16px;
      box-shadow: 0 24px 64px rgba(6,35,41,.45), 0 4px 16px rgba(0,0,0,.1);
      overflow: hidden; border: 1px solid rgba(255,255,255,.08);
      animation: login-in 500ms cubic-bezier(.23,1,.32,1) both;
    }
    .login-head {
      padding: 32px 32px 24px;
      background: #fff; border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .login-icon {
      width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 18px;
      background: linear-gradient(135deg, var(--brand), var(--brand-mid));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(12,69,102,.35);
      font-size: 22px;
    }
    .login-head h1 { font-size: 1.1rem; font-weight: 700; color: var(--brand); margin: 0 0 5px; }
    .login-head p  { font-size: .78rem; color: var(--text-3); margin: 0; }
    .login-body    { padding: 28px 32px 32px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-label { font-size: .67rem; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .6px; }
    .login-error {
      padding: 9px 13px; border-radius: var(--radius); margin-bottom: 12px;
      font-size: .78rem; color: var(--red); background: var(--red-dim); border: 1px solid #fca5a5;
    }

    /* ── Loading ───────────────────────────────────────────────────────── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 99;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .loading-ring {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #c8dde8; border-top-color: var(--brand);
      animation: spin .6s linear infinite;
    }

    /* ── Dropdown (participantes) ──────────────────────────────────────── */
    .dropdown-panel {
      position: absolute; z-index: 50; top: calc(100% + 4px); left: 0; width: 280px;
      background: var(--bg-card); border: 1px solid var(--border-dark);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      overflow: hidden; animation: modal-in 180ms cubic-bezier(.23,1,.32,1);
    }

    /* ── Parte card (detail) ───────────────────────────────────────────── */
    .parte-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--bg);
    }
    .parte-head { padding: 10px 14px; display:flex; align-items:center; gap:8px; background: var(--bg-card); border-bottom:1px solid var(--border); }
    .parte-ab   { padding: 8px 14px; border-top: 1px solid var(--border); display:flex; align-items:flex-start; gap: 10px; transition: background 120ms; }
    .parte-ab:hover { background: var(--brand-dim); }
    .parte-ab:first-of-type { border-top: none; }

    /* ── Misc ──────────────────────────────────────────────────────────── */
    .mono { font-family: 'ui-monospace', 'Cascadia Code', monospace; }
  </style>
</head>

<body x-data="app()" x-init="init()" x-cloak>

<!-- ─── LOGIN ──────────────────────────────────────────────────────────── -->
<div x-show="pageState==='login'" class="login-overlay">
  <div class="login-box">
    <div class="login-head">
      <div class="login-icon">⚖</div>
      <h1>Caja de Abogados</h1>
      <p>Salta · Sistema PJN</p>
    </div>
    <div class="login-body">
      <form @submit.prevent="hacerLogin()">
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <input x-model="loginUser" type="text" autocomplete="username"
                 class="inp" placeholder="Nombre de usuario" :disabled="loginLoading">
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label">Contraseña</label>
          <input x-model="loginPass" type="password" autocomplete="current-password"
                 class="inp" placeholder="••••••••" :disabled="loginLoading">
        </div>
        <div x-show="loginError" class="login-error" x-text="loginError"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px"
                :disabled="loginLoading">
          <svg x-show="loginLoading" class="spinner" style="width:13px;height:13px;border-width:2px;border-color:#9ca3af;border-top-color:#fff;border-radius:50%;flex-shrink:0" viewBox="0 0 24 24"></svg>
          <span x-text="loginLoading ? 'Ingresando...' : 'Ingresar'"></span>
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ─── LOADING ─────────────────────────────────────────────────────────── -->
<div x-show="pageState==='loading'" class="loading-screen">
  <div class="loading-ring"></div>
</div>

<!-- ─── APP ─────────────────────────────────────────────────────────────── -->
<template x-if="pageState==='app'">
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon"><span style="color:#fff;font-size:16px">⚖</span></div>
      <div class="sidebar-logo-text">
        <div class="name">Caja de Abogados</div>
        <div class="sub">Salta · PJN</div>
      </div>
    </div>

    <div>
      <div class="nav-section-label">Vistas</div>
      <button class="nav-btn" :class="vista==='expedientes'&&'active'"
              @click="vista='expedientes';panelDer=null;seleccionados=[];todosDelFiltro=false">
        <svg style="width:15px;height:15px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Expedientes
      </button>
      <button class="nav-btn" :class="vista==='abogados'&&'active'"
              @click="vista='abogados';panelDer=null;if(!abogados.length)cargarAbogados()">
        <svg style="width:15px;height:15px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Por Abogado
      </button>
      <template x-if="currentUser?.role==='admin'">
        <button class="nav-btn" :class="vista==='usuarios'&&'active'"
                @click="vista='usuarios';cargarUsuarios()">
          <svg style="width:15px;height:15px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          Usuarios
        </button>
      </template>
    </div>

    <div class="sidebar-footer">
      <button class="btn-refresh" @click="cargar()" :disabled="cargando">
        <svg style="width:13px;height:13px" :class="cargando&&'spinner'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <span x-text="cargando?'Actualizando…':'Actualizar datos'"></span>
      </button>
      <div class="user-chip">
        <div>
          <div class="u-name" x-text="currentUser?.username"></div>
          <div class="u-role" x-text="currentUser?.role==='admin'?'Administrador':'Usuario'"></div>
        </div>
        <button class="btn-logout" @click="logout()" title="Cerrar sesión">
          <svg style="width:15px;height:15px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- APP HEADER -->
    <header class="app-header">
      <div class="title-block">
        <div class="title"
             x-text="vista==='expedientes'?'Expedientes analizados':vista==='abogados'?'Por Abogado':vista==='usuarios'?'Gestión de Usuarios':'Detalle de Expediente'">
        </div>
        <div class="sub"
             x-text="vista==='expedientes'?totalExp+' expedientes · '+(stats.total||0)+' en total'
                    :vista==='abogados'?abogados.length+' abogados'
                    :vista==='usuarios'?usuarios.length+' usuarios'
                    :(expedienteDetalle?expedienteDetalle.numero+'/'+expedienteDetalle.anio:'')">
        </div>
      </div>
      <div class="header-stats" x-show="vista==='expedientes'||vista==='abogados'">
        <div class="h-stat">
          <div>
            <div class="s-num" x-text="stats.si??'—'"></div>
            <div class="s-lbl">Presenta</div>
          </div>
        </div>
        <div class="h-divider"></div>
        <div class="h-stat">
          <div>
            <div class="s-num" x-text="stats.no??'—'"></div>
            <div class="s-lbl">No presenta</div>
          </div>
        </div>
        <div class="h-divider"></div>
        <div class="h-stat">
          <div>
            <div class="s-num" x-text="stats.total??'—'"></div>
            <div class="s-lbl">Total</div>
          </div>
        </div>
      </div>
    </header>

    <!-- STAT CARDS -->
    <div class="stats-row" x-show="!cargando && (vista==='expedientes'||vista==='abogados')">
      <div class="stat-card"
           :class="filtroRes==='todos'&&vista==='expedientes'?'ring-brand':''"
           @click="if(vista==='expedientes'){filtroRes='todos';aplicarFiltros()}">
        <div class="s-num" x-text="stats.total??'—'"></div>
        <div class="s-lbl" x-text="currentUser?.role==='admin'?'Total expedientes':'Mis expedientes'"></div>
        <div class="s-bar"><div class="s-bar-fill" style="width:100%;background:var(--brand);opacity:.25"></div></div>
      </div>
      <div class="stat-card"
           :class="filtroRes==='Si'&&vista==='expedientes'?'ring-green':''"
           @click="if(vista==='expedientes'){filtroRes=filtroRes==='Si'?'todos':'Si';aplicarFiltros()}">
        <div class="s-num" style="color:var(--green)" x-text="stats.si??'—'"></div>
        <div class="s-lbl">Caja se presenta</div>
        <div class="s-bar"><div class="s-bar-fill" :style="'width:'+(stats.pct_si||0)+'%;background:var(--green)'"></div></div>
      </div>
      <div class="stat-card"
           :class="filtroRes==='No'&&vista==='expedientes'?'ring-red':''"
           @click="if(vista==='expedientes'){filtroRes=filtroRes==='No'?'todos':'No';aplicarFiltros()}">
        <div class="s-num" style="color:var(--red)" x-text="stats.no??'—'"></div>
        <div class="s-lbl">No se presenta</div>
        <div class="s-bar"><div class="s-bar-fill" :style="'width:'+(stats.pct_no||0)+'%;background:var(--red)'"></div></div>
      </div>
      <div class="stat-card"
           x-show="vista==='expedientes'"
           :class="filtroRes==='error'&&vista==='expedientes'?'ring-amber':''"
           @click="if(stats.error>0){filtroRes=filtroRes==='error'?'todos':'error';aplicarFiltros()}">
        <div class="s-num" style="color:var(--amber)" x-text="stats.error??'—'"></div>
        <div class="s-lbl">Error / Pendiente</div>
        <div class="s-bar"><div class="s-bar-fill" style="width:100%;background:var(--amber);opacity:.25"></div></div>
      </div>
      <div class="stat-card" x-show="vista==='abogados'">
        <div class="s-num" style="color:var(--brand)" x-text="abogados.length"></div>
        <div class="s-lbl">Abogados únicos</div>
        <div class="s-bar"><div class="s-bar-fill" style="width:100%;background:var(--brand);opacity:.3"></div></div>
      </div>
    </div>

    <!-- SPINNER -->
    <div x-show="cargando" class="spinner-wrap" style="flex:1;gap:12px;padding:40px 0;width:100%">
      <div class="loading-ring"></div>
      <span style="font-size:.82rem;color:var(--text-3);font-weight:500">Cargando datos...</span>
    </div>

    <!-- ═══ VISTA EXPEDIENTES ═══════════════════════════════════════════ -->
    <template x-if="!cargando&&vista==='expedientes'">
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">

      <!-- Assign bar -->
      <template x-if="currentUser?.role==='admin'&&(seleccionados.length>0||todosDelFiltro)">
        <div class="assign-bar">
          <svg style="width:14px;height:14px;color:var(--brand);flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="a-label">
            <span x-show="!todosDelFiltro" x-text="seleccionados.length+' seleccionado/s'"></span>
            <span x-show="todosDelFiltro"  x-text="'Todos los '+totalExp+' del filtro'"></span>
          </span>
          <span x-show="!todosDelFiltro&&seleccionados.length<totalExp" class="a-link"
                @click="todosDelFiltro=true;seleccionados=[]">
            Seleccionar todos los <span x-text="totalExp"></span> del filtro
          </span>
          <div style="flex:1"></div>
          <select x-model="asignarA" class="inp" style="padding:5px 10px;font-size:.75rem">
            <option value="">— Asignar a usuario —</option>
            <template x-for="u in usuariosLista" :key="u.id">
              <option :value="u.id" x-text="u.username+(u.role==='admin'?' (admin)':'')"></option>
            </template>
          </select>
          <button class="btn btn-primary btn-sm" @click="ejecutarAsignacion()"
                  :disabled="!asignarA||asignandoMasivo">
            <span x-text="asignandoMasivo?'Asignando…':'Asignar'"></span>
          </button>
          <button class="btn btn-ghost btn-sm" @click="seleccionados=[];todosDelFiltro=false;asignarA=''">Limpiar</button>
        </div>
      </template>

      <!-- Filters -->
      <div class="filters-bar">
        <div class="flex-row">
          <select x-model="filtroRes" @change="aplicarFiltros()" class="inp">
            <option value="todos">Todos los resultados</option>
            <option value="Si">✓  Se presenta</option>
            <option value="No">✗  No se presenta</option>
            <option value="error">⚠  Error / Pendiente</option>
          </select>
          <select x-model="filtroJuzgado" @change="aplicarFiltros()" class="inp" style="flex:1">
            <option value="">Todos los juzgados</option>
            <template x-for="j in juzgadosUnicos" :key="j">
              <option :value="j" x-text="j"></option>
            </template>
          </select>
          <select x-model="filtroSecretaria" @change="aplicarFiltros()" class="inp" style="flex:1">
            <option value="">Todas las secretarías</option>
            <template x-for="s in secretariasUnicas" :key="s">
              <option :value="s" x-text="s"></option>
            </template>
          </select>
          <button class="btn btn-success btn-sm" @click="exportarExpedientes()">
            <svg style="width:12px;height:12px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Exportar Excel
          </button>
        </div>
        <div style="position:relative">
          <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text-3)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input x-model="filtroTxt" type="text" class="inp" style="width:100%;padding-left:32px"
                 placeholder="Buscar número, carátula, parte, abogado…"
                 @input.debounce.400ms="aplicarFiltros()">
        </div>

        <!-- Filtro asignación (solo admin) -->
        <template x-if="currentUser?.role==='admin'">
          <div class="flex-row">
            <select x-model="filtroAsignado" @change="aplicarFiltros()" class="inp">
              <option value="">Todos (asignados y no)</option>
              <option value="si">Solo asignados</option>
              <option value="no">Sin asignar</option>
            </select>
            <select x-model="filtroAsignadoA" @change="aplicarFiltros()" class="inp" style="flex:1">
              <option value="">— Filtrar por usuario —</option>
              <template x-for="u in usuariosLista.filter(u=>u.role!=='admin')" :key="u.id">
                <option :value="u.id" x-text="u.username"></option>
              </template>
            </select>
            <button x-show="filtroAsignado||filtroAsignadoA"
                    @click="filtroAsignado='';filtroAsignadoA='';aplicarFiltros()"
                    class="btn btn-ghost btn-sm">Limpiar</button>
          </div>
        </template>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button @click="filtroConDemanda=!filtroConDemanda;aplicarFiltros()"
                  class="btn btn-sm"
                  :class="filtroConDemanda?'btn-primary':'btn-ghost'">
            Con demanda
          </button>
          <button @click="filtroSinMonto=!filtroSinMonto;filtroMontoMin='';filtroMontoMax='';aplicarFiltros()"
                  class="btn btn-sm"
                  :class="filtroSinMonto?'btn-primary':'btn-ghost'">
            Sin monto
          </button>
          <div style="display:flex;align-items:center;gap:4px" x-show="!filtroSinMonto">
            <span style="font-size:.7rem;color:var(--text-3);white-space:nowrap">Monto:</span>
            <input type="number" x-model="filtroMontoMin" @input.debounce.500ms="aplicarFiltros()"
                   placeholder="Mín" min="0" class="inp" style="width:90px;font-size:.75rem">
            <span style="color:var(--border-dark);font-size:.8rem">—</span>
            <input type="number" x-model="filtroMontoMax" @input.debounce.500ms="aplicarFiltros()"
                   placeholder="Máx" min="0" class="inp" style="width:90px;font-size:.75rem">
            <button x-show="filtroMontoMin||filtroMontoMax"
                    @click="filtroMontoMin='';filtroMontoMax='';aplicarFiltros()"
                    style="color:var(--text-3);border:none;background:none;cursor:pointer;padding:4px">
              <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex:1">
            <span style="font-size:.7rem;color:var(--text-3);white-space:nowrap">F. Inicio:</span>
            <input type="date" x-model="filtroFechaDesde" @change="aplicarFiltros()" class="inp" style="flex:1;font-size:.75rem">
            <span style="color:var(--border-dark);font-size:.8rem">—</span>
            <input type="date" x-model="filtroFechaHasta" @change="aplicarFiltros()" class="inp" style="flex:1;font-size:.75rem">
            <button x-show="filtroFechaDesde||filtroFechaHasta"
                    @click="filtroFechaDesde='';filtroFechaHasta='';aplicarFiltros()"
                    style="color:var(--text-3);border:none;background:none;cursor:pointer;padding:4px">
              <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Participantes dropdowns -->
        <div class="flex-row" style="flex-wrap:wrap;gap:8px"
             x-show="participantes.actor.length||participantes.demandado.length||participantes.tercero.length">

          <div style="position:relative;min-width:140px" x-show="participantes.actor.length"
               @click.outside="if(dropdownAbierto==='actor')dropdownAbierto=null">
            <button @click="dropdownAbierto=dropdownAbierto==='actor'?null:'actor'"
                    class="inp" style="width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer"
                    :style="filtroActores.length?'border-color:#93c5fd;background:#eff6ff':''">
              <span style="font-size:.75rem;color:var(--text-2)">Actores
                <strong x-show="filtroActores.length" style="color:var(--brand)" x-text="'('+filtroActores.length+')'"></strong>
              </span>
              <svg style="width:11px;height:11px;color:var(--text-3)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <div x-show="dropdownAbierto==='actor'" class="dropdown-panel">
              <div style="padding:8px;border-bottom:1px solid var(--border)">
                <input x-model="buscarPart.actor" @click.stop class="inp" style="width:100%;font-size:.75rem;padding:5px 9px" placeholder="Buscar actor…">
              </div>
              <div style="overflow-y:auto;max-height:200px">
                <template x-for="n in partFiltrada('actor')" :key="n">
                  <label style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:.78rem;color:var(--text-1)" class="parte-ab">
                    <input type="checkbox" :value="n" x-model="filtroActores" @change="aplicarFiltros()">
                    <span x-text="n" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                  </label>
                </template>
              </div>
              <div x-show="filtroActores.length" style="padding:6px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:.7rem;color:var(--text-3)" x-text="filtroActores.length+' sel.'"></span>
                <button @click="filtroActores=[];aplicarFiltros()" style="font-size:.7rem;color:var(--red);border:none;background:none;cursor:pointer">Limpiar</button>
              </div>
            </div>
          </div>

          <div style="position:relative;min-width:140px" x-show="participantes.demandado.length"
               @click.outside="if(dropdownAbierto==='demandado')dropdownAbierto=null">
            <button @click="dropdownAbierto=dropdownAbierto==='demandado'?null:'demandado'"
                    class="inp" style="width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer"
                    :style="filtroDemandados.length?'border-color:#fca5a5;background:#fef2f2':''">
              <span style="font-size:.75rem;color:var(--text-2)">Demandados
                <strong x-show="filtroDemandados.length" style="color:var(--red)" x-text="'('+filtroDemandados.length+')'"></strong>
              </span>
              <svg style="width:11px;height:11px;color:var(--text-3)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <div x-show="dropdownAbierto==='demandado'" class="dropdown-panel">
              <div style="padding:8px;border-bottom:1px solid var(--border)">
                <input x-model="buscarPart.demandado" @click.stop class="inp" style="width:100%;font-size:.75rem;padding:5px 9px" placeholder="Buscar demandado…">
              </div>
              <div style="overflow-y:auto;max-height:200px">
                <template x-for="n in partFiltrada('demandado')" :key="n">
                  <label style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:.78rem;color:var(--text-1)" class="parte-ab">
                    <input type="checkbox" :value="n" x-model="filtroDemandados" @change="aplicarFiltros()">
                    <span x-text="n" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                  </label>
                </template>
              </div>
              <div x-show="filtroDemandados.length" style="padding:6px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:.7rem;color:var(--text-3)" x-text="filtroDemandados.length+' sel.'"></span>
                <button @click="filtroDemandados=[];aplicarFiltros()" style="font-size:.7rem;color:var(--red);border:none;background:none;cursor:pointer">Limpiar</button>
              </div>
            </div>
          </div>

          <div style="position:relative;min-width:140px" x-show="participantes.tercero.length"
               @click.outside="if(dropdownAbierto==='tercero')dropdownAbierto=null">
            <button @click="dropdownAbierto=dropdownAbierto==='tercero'?null:'tercero'"
                    class="inp" style="width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer"
                    :style="filtroTerceros.length?'border-color:#d8b4fe;background:#fdf4ff':''">
              <span style="font-size:.75rem;color:var(--text-2)">Terceros
                <strong x-show="filtroTerceros.length" style="color:#7c3aed" x-text="'('+filtroTerceros.length+')'"></strong>
              </span>
              <svg style="width:11px;height:11px;color:var(--text-3)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <div x-show="dropdownAbierto==='tercero'" class="dropdown-panel">
              <div style="padding:8px;border-bottom:1px solid var(--border)">
                <input x-model="buscarPart.tercero" @click.stop class="inp" style="width:100%;font-size:.75rem;padding:5px 9px" placeholder="Buscar tercero…">
              </div>
              <div style="overflow-y:auto;max-height:200px">
                <template x-for="n in partFiltrada('tercero')" :key="n">
                  <label style="display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:.78rem;color:var(--text-1)" class="parte-ab">
                    <input type="checkbox" :value="n" x-model="filtroTerceros" @change="aplicarFiltros()">
                    <span x-text="n" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                  </label>
                </template>
              </div>
              <div x-show="filtroTerceros.length" style="padding:6px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:.7rem;color:var(--text-3)" x-text="filtroTerceros.length+' sel.'"></span>
                <button @click="filtroTerceros=[];aplicarFiltros()" style="font-size:.7rem;color:var(--red);border:none;background:none;cursor:pointer">Limpiar</button>
              </div>
            </div>
          </div>

          <button x-show="filtroActores.length||filtroDemandados.length||filtroTerceros.length"
                  class="btn btn-danger btn-sm"
                  @click="filtroActores=[];filtroDemandados=[];filtroTerceros=[];aplicarFiltros()">
            Limpiar todo
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <template x-if="currentUser?.role==='admin'">
                <th style="width:40px;text-align:center">
                  <input type="checkbox"
                         :checked="seleccionados.length===expedientesPagina.length&&expedientesPagina.length>0"
                         @change="toggleSeleccionarPagina($event)"
                         style="cursor:pointer;accent-color:var(--brand)">
                </th>
              </template>
              <th style="text-align:left">Número / Año</th>
              <th style="text-align:left">Actor</th>
              <th style="text-align:left">Demandado</th>
              <th style="text-align:center">Resultado</th>
              <th style="text-align:center">F. Inicio</th>
              <th style="text-align:center">Demanda</th>
              <template x-if="currentUser?.role==='admin'">
                <th style="width:36px"></th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="exp in expedientesPagina" :key="exp.id">
              <tr :class="seleccionados.includes(exp.id)?'selected':''" style="cursor:pointer" @click="verDetalle(exp.id)">
                <template x-if="currentUser?.role==='admin'">
                  <td style="text-align:center" @click.stop>
                    <input type="checkbox" :value="exp.id" x-model="seleccionados"
                           @change="todosDelFiltro=false" style="cursor:pointer;accent-color:var(--brand)">
                  </td>
                </template>
                <td>
                  <div class="mono" style="font-size:.78rem;font-weight:600;color:var(--text-1)" x-text="exp.numero+' / '+exp.anio"></div>
                  <div style="font-size:.7rem;color:var(--text-3);margin-top:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="(exp.caratula||'').substring(0,45)"></div>
                </td>
                <td style="font-size:.78rem;color:var(--text-2);max-width:160px">
                  <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block" x-text="getParte(exp,'actor')"></span>
                </td>
                <td style="font-size:.78rem;color:var(--text-2);max-width:160px">
                  <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block" x-text="getParte(exp,'demandado')"></span>
                </td>
                <td style="text-align:center">
                  <span class="badge"
                        :class="{'badge-si':exp.caja_se_presenta==='Si','badge-no':exp.caja_se_presenta==='No','badge-err':!['Si','No'].includes(exp.caja_se_presenta)}"
                        x-text="exp.caja_se_presenta||'—'"></span>
                </td>
                <td style="text-align:center;font-size:.75rem;color:var(--text-2)" class="mono" x-text="exp.fecha_inicio||'—'"></td>
                <td style="text-align:center" @click.stop>
                  <div x-show="exp.url_demanda&&exp.url_demanda!=='NINGUNA'" style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">
                    <template x-for="(url,i) in (exp.url_demanda||'').split('|').filter(u=>u&&u!=='NINGUNA')" :key="i">
                      <a :href="url" target="_blank"
                         :title="'Demanda — Parte '+(i+1)"
                         style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-3);transition:all 140ms;text-decoration:none"
                         onmouseover="this.style.background='var(--brand-dim)';this.style.borderColor='#a5c8db';this.style.color='var(--brand)'"
                         onmouseout="this.style.background='var(--bg)';this.style.borderColor='var(--border)';this.style.color='var(--text-3)'">
                        <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                      </a>
                    </template>
                  </div>
                  <span x-show="!exp.url_demanda||exp.url_demanda==='NINGUNA'" style="color:var(--border-dark);font-size:.75rem">—</span>
                </td>
                <template x-if="currentUser?.role==='admin'">
                  <td style="text-align:center" @click.stop>
                    <button @click="eliminarExpediente(exp.id)"
                            style="border:none;background:none;cursor:pointer;padding:5px;border-radius:5px;color:var(--text-3);transition:all 140ms"
                            onmouseover="this.style.background='var(--red-dim)';this.style.color='var(--red)'"
                            onmouseout="this.style.background='none';this.style.color='var(--text-3)'"
                            title="Eliminar">
                      <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                      </svg>
                    </button>
                  </td>
                </template>
              </tr>
            </template>
            <tr x-show="expedientesPagina.length===0">
              <td colspan="8" style="text-align:center;padding:48px;color:var(--text-3);font-size:.85rem">
                Ningún expediente coincide con el filtro.
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <button class="pg-btn" @click="paginaAnterior()" :disabled="paginaActual<=1">◀ Anterior</button>
        <span class="info" x-text="'Página '+paginaActual+' de '+totalPaginas+' · '+totalExp+' expedientes'"></span>
        <button class="pg-btn" @click="paginaSiguiente()" :disabled="paginaActual>=totalPaginas">Siguiente ▶</button>
      </div>

    </div>
    </template>

    <!-- ═══ VISTA DETALLE ════════════════════════════════════════════════ -->
    <template x-if="!cargando&&vista==='detalle'">
    <div class="detail-page">
      <button @click="vista='expedientes';expedienteDetalle=null"
              class="btn btn-ghost btn-sm" style="margin-bottom:18px">
        <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Volver a expedientes
      </button>

      <!-- Header detalle -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
        <div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <h2 class="mono" style="font-size:1.5rem;font-weight:800;color:var(--text-1);margin:0" x-text="expedienteDetalle?.numero+' / '+expedienteDetalle?.anio"></h2>
            <span class="badge"
                  :class="{'badge-si':expedienteDetalle?.caja_se_presenta==='Si','badge-no':expedienteDetalle?.caja_se_presenta==='No','badge-err':!['Si','No'].includes(expedienteDetalle?.caja_se_presenta||'')}"
                  x-text="'Caja: '+(expedienteDetalle?.caja_se_presenta||'—')"></span>
          </div>
          <p style="color:var(--text-2);margin:6px 0 0;font-size:.85rem" x-text="expedienteDetalle?.caratula||'—'"></p>
        </div>
        <template x-if="currentUser?.role==='admin'">
          <button class="btn btn-danger btn-sm"
                  @click="if(confirm('¿Eliminar este expediente permanentemente?'))eliminarExpedienteDetalle()">
            <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Eliminar
          </button>
        </template>
      </div>

      <div class="detail-grid">
        <!-- Columna izquierda -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <!-- Info card -->
          <div class="card">
            <div class="section-header">Información del expediente</div>
            <div style="padding:16px 18px;display:flex;flex-direction:column;gap:8px">
              <template x-for="[lbl,val] in [
                ['Jurisdicción',expedienteDetalle?.jurisdiccion],
                ['Juzgado',expedienteDetalle?.juzgado],
                ['Secretaría',expedienteDetalle?.secretaria],
                ['F. Inicio',expedienteDetalle?.fecha_inicio],
                ['F. Demanda',expedienteDetalle?.fecha_demanda],
                ['F. Análisis',(expedienteDetalle?.fecha_analisis||'').substring(0,10)],
                ['Fuente',expedienteDetalle?.fuente],
              ]" :key="lbl">
                <div x-show="val" class="info-row">
                  <span class="info-label" x-text="lbl"></span>
                  <span class="info-val mono" x-text="val"></span>
                </div>
              </template>
              <div x-show="expedienteDetalle?.detalle_demanda" class="info-row">
                <span class="info-label">Detalle</span>
                <span class="info-val" style="font-size:.78rem;line-height:1.5" x-text="expedienteDetalle?.detalle_demanda"></span>
              </div>
              <div x-show="expedienteDetalle?.url_demanda&&expedienteDetalle?.url_demanda!=='NINGUNA'">
                <template x-for="(url,i) in (expedienteDetalle?.url_demanda||'').split('|').filter(u=>u&&u!=='NINGUNA')" :key="i">
                  <div class="info-row">
                    <span class="info-label" x-text="(expedienteDetalle?.url_demanda||'').split('|').filter(u=>u&&u!=='NINGUNA').length>1?'Demanda '+(i+1):'Demanda'"></span>
                    <a :href="url" target="_blank"
                       style="color:var(--brand);font-size:.78rem;display:flex;align-items:center;gap:4px;text-decoration:none">
                      <svg style="width:13px;height:13px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                      </svg>
                      Ver documento
                    </a>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Movimientos -->
          <div>
            <div style="font-size:.68rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">
              Movimientos
            </div>

            <!-- Formulario agregar -->
            <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
              <div style="display:flex;gap:6px;align-items:center">
                <select x-model="movTipoId" class="inp" style="flex:1;font-size:.78rem">
                  <option value="">— Seleccioná tipo —</option>
                  <template x-for="t in tiposMovimiento" :key="t.id">
                    <option :value="t.id" x-text="t.nombre"></option>
                  </template>
                </select>
                <button @click="crearTipoMovimiento()"
                        style="white-space:nowrap;font-size:.75rem;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-2);cursor:pointer"
                        title="Crear nuevo tipo">
                  + Tipo
                </button>
              </div>
              <textarea x-model="movObservacion" placeholder="Observación (opcional)"
                        class="inp" rows="2"
                        style="font-size:.78rem;resize:vertical"></textarea>
              <button @click="agregarMovimiento()"
                      :disabled="!movTipoId"
                      class="btn btn-primary btn-sm"
                      style="align-self:flex-end">
                Agregar movimiento
              </button>
            </div>

            <!-- Historial -->
            <div x-show="(movimientos||[]).length===0" style="font-size:.75rem;color:var(--text-3);font-style:italic">
              Sin movimientos registrados.
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <template x-for="mov in (movimientos||[])" :key="mov.id">
                <div style="padding:8px 10px;border-radius:8px;background:var(--bg-2);border:1px solid var(--border)">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
                    <span style="font-size:.78rem;font-weight:600;color:var(--text-1)" x-text="mov.tipo"></span>
                    <span style="font-size:.7rem;color:var(--text-3);white-space:nowrap" x-text="mov.fecha_hora"></span>
                  </div>
                  <div x-show="mov.observacion" style="font-size:.75rem;color:var(--text-2);margin-top:3px" x-text="mov.observacion"></div>
                  <div style="font-size:.68rem;color:var(--text-3);margin-top:3px" x-text="mov.usuario"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- Participantes -->
          <div>
            <div style="font-size:.68rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">
              Intervinientes (<span x-text="(expedienteDetalle?.participantes||[]).length"></span>)
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <template x-for="parte in (expedienteDetalle?.participantes||[])" :key="parte.id">
                <div class="parte-card">
                  <div class="parte-head">
                    <span class="pill"
                          :class="{'pill-actor':(parte.tipo||'').toLowerCase().includes('actor'),'pill-demandado':(parte.tipo||'').toLowerCase().includes('demandado'),'pill-tercero':(parte.tipo||'').toLowerCase().includes('tercero'),'pill-otro':!['actor','demandado','tercero'].some(t=>(parte.tipo||'').toLowerCase().includes(t))}"
                          x-text="parte.tipo||'PARTE'"></span>
                    <span style="font-size:.85rem;font-weight:600;color:var(--text-1)" x-text="parte.nombre"></span>
                  </div>
                  <div x-show="!(parte.abogados||[]).length" style="padding:8px 14px;font-size:.75rem;color:var(--text-3);font-style:italic">Sin abogados</div>
                  <template x-for="ab in (parte.abogados||[])" :key="ab.id">
                    <div class="parte-ab">
                      <svg style="width:13px;height:13px;color:var(--text-3);flex-shrink:0;margin-top:2px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                      </svg>
                      <div>
                        <div style="font-size:.8rem;font-weight:500;color:var(--text-1)" x-text="ab.nombre"></div>
                        <div style="display:flex;gap:12px;margin-top:2px">
                          <span x-show="ab.tomo_folio" class="mono" style="font-size:.68rem;color:var(--text-3)" x-text="'T/F: '+ab.tomo_folio"></span>
                          <span x-show="ab.cuit" class="mono" style="font-size:.68rem;color:var(--text-3)" x-text="'CUIT: '+ab.cuit"></span>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
              <div x-show="!(expedienteDetalle?.participantes||[]).length" style="text-align:center;color:var(--text-3);font-size:.82rem;padding:24px">Sin intervinientes</div>
            </div>
          </div>
        </div>

        <!-- Columna derecha: formulario -->
        <div>
          <div class="card">
            <div class="section-header">Datos de la demanda</div>
            <div style="padding:20px;display:flex;flex-direction:column;gap:16px">
              <!-- TODO: campos categoria y materia ocultos temporalmente -->
              <div class="form-group" style="gap:6px">
                <label class="form-label">Monto de la demanda</label>
                <div style="position:relative">
                  <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-3);font-weight:600">$</span>
                  <input x-model="detalleMonto" type="number" min="0" step="0.01"
                         class="inp" style="width:100%;padding-left:24px" placeholder="0.00">
                </div>
              </div>

              <button @click="guardarDetalle()" :disabled="guardandoDetalle"
                      class="btn btn-primary" style="justify-content:center;padding:10px">
                <svg x-show="guardandoDetalle" class="spinner" style="width:13px;height:13px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%" viewBox="0 0 24 24"></svg>
                <span x-text="guardandoDetalle?'Guardando…':detalleGuardado?'✓ Guardado':'Guardar'"></span>
              </button>

              <!-- Datos previos -->
              <div x-show="expedienteDetalle?.monto_demanda"
                   style="padding:14px;background:var(--brand-dim);border-radius:var(--radius);border:1px solid #a5c8db">
                <div style="font-size:.65rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Registrado anteriormente</div>
                <div x-show="expedienteDetalle?.monto_demanda" style="font-size:.82rem;font-weight:700;color:var(--brand)">
                  <span style="font-weight:400;color:var(--text-2)">Monto: </span>
                  <span class="mono" x-text="'$ '+Number(expedienteDetalle?.monto_demanda).toLocaleString('es-AR',{minimumFractionDigits:2})"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </template>

    <!-- ═══ VISTA ABOGADOS ═══════════════════════════════════════════════ -->
    <template x-if="!cargando&&vista==='abogados'">
    <div style="display:flex;flex:1;overflow:hidden">
      <div style="display:flex;flex-direction:column;overflow:hidden;transition:width .25s" :style="panelDer?'width:50%':'width:100%'">
        <div class="filters-bar" style="flex-direction:row">
          <div style="position:relative;flex:1">
            <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text-3)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input x-model="filtroAb" class="inp" style="width:100%;padding-left:32px" placeholder="Buscar abogado por nombre o CUIT…" @input.debounce.400ms="cargarAbogados()">

            <option value="total">Más expedientes</option>
            <option value="nombre">Nombre A-Z</option>

          </select>

            <svg style="width:12px;height:12px" fill="none" stroke="currentColor" viewBox="0 0 24 24">

        </div>
        <div style="padding:8px 20px;background:var(--bg);border-bottom:1px solid var(--border)">
          <div style="position:relative">
            <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text-3)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <input x-model="filtroRepresenta" class="inp" style="width:100%;padding-left:32px" placeholder="Filtrar por parte representada…" @input.debounce.400ms="cargarAbogados()">
          </div>
        </div>
        <div class="tbl-wrap">
          <table class="tbl">
            <thead>
              <tr>
                <th style="text-align:left">Abogado</th>
                <th style="text-align:left">CUIT</th>
                <th style="text-align:center">Total</th>
                <th style="text-align:center">Presenta</th>
                <th style="text-align:center">No presenta</th>
                <th style="text-align:center">Error</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="ab in abogados" :key="ab.nombre">
                <tr :class="panelDer?.nombre===ab.nombre?'selected':''" style="cursor:pointer" @click="panelDer=panelDer?.nombre===ab.nombre?null:ab">
                  <td>
                    <div style="font-weight:500;font-size:.82rem;color:var(--text-1)" x-text="ab.nombre"></div>
                    <div x-show="ab.tomo_folio" class="mono" style="font-size:.68rem;color:var(--text-3);margin-top:2px" x-text="'T/F: '+ab.tomo_folio"></div>
                  </td>
                  <td class="mono" style="font-size:.73rem;color:var(--text-3)" x-text="ab.cuit||'—'"></td>
                  <td style="text-align:center;font-weight:700;color:var(--text-1)" x-text="ab.total"></td>
                  <td style="text-align:center">
                    <span x-show="ab.si>0" class="badge badge-si" x-text="ab.si"></span>
                    <span x-show="ab.si===0" style="color:var(--border-dark)">—</span>
                  </td>
                  <td style="text-align:center">
                    <span x-show="ab.no>0" class="badge badge-no" x-text="ab.no"></span>
                    <span x-show="ab.no===0" style="color:var(--border-dark)">—</span>
                  </td>
                  <td style="text-align:center">
                    <span x-show="ab.error>0" class="badge badge-err" x-text="ab.error"></span>
                    <span x-show="ab.error===0" style="color:var(--border-dark)">—</span>
                  </td>
                </tr>
              </template>
              <tr x-show="abogados.length===0&&!cargandoAb">
                <td colspan="6" style="text-align:center;padding:48px;color:var(--text-3);font-size:.82rem">No hay abogados registrados.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div x-show="panelDer" class="panel-right" style="width:50%">
        <div style="padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <div>
              <div style="font-weight:700;font-size:.95rem;color:var(--text-1)" x-text="panelDer?.nombre"></div>
              <div style="display:flex;gap:12px;margin-top:4px" class="mono">
                <span x-show="panelDer?.cuit" style="font-size:.7rem;color:var(--text-3)" x-text="'CUIT: '+panelDer?.cuit"></span>
                <span x-show="panelDer?.tomo_folio" style="font-size:.7rem;color:var(--text-3)" x-text="'T/F: '+panelDer?.tomo_folio"></span>
              </div>
              <div style="display:flex;gap:16px;margin-top:12px">
                <div><div style="font-size:1.3rem;font-weight:800;color:var(--text-1)" x-text="panelDer?.total"></div><div style="font-size:.65rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px">Total</div></div>
                <div><div style="font-size:1.3rem;font-weight:800;color:var(--green)" x-text="panelDer?.si"></div><div style="font-size:.65rem;color:var(--green);text-transform:uppercase;letter-spacing:.4px">Presenta</div></div>
                <div><div style="font-size:1.3rem;font-weight:800;color:var(--red)" x-text="panelDer?.no"></div><div style="font-size:.65rem;color:var(--red);text-transform:uppercase;letter-spacing:.4px">No presenta</div></div>
                <template x-if="panelDer?.error>0">
                  <div><div style="font-size:1.3rem;font-weight:800;color:var(--amber)" x-text="panelDer?.error"></div><div style="font-size:.65rem;color:var(--amber);text-transform:uppercase;letter-spacing:.4px">Error</div></div>
                </template>
              </div>
            </div>
            <button @click="panelDer=null" style="border:none;background:none;cursor:pointer;color:var(--text-3);padding:4px;border-radius:6px" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='none'">
              <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
        <!-- Representados -->
        <div style="padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0">
          <div style="font-size:.63rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Partes representadas</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <template x-for="rep in (panelDer?.representados||[])" :key="rep.parte_tipo+'_'+rep.parte_nombre">
              <div style="display:flex;align-items:center;gap:8px">
                <span class="pill" :class="{'pill-actor':rep.parte_tipo.toLowerCase().includes('actor'),'pill-demandado':rep.parte_tipo.toLowerCase().includes('demandado'),'pill-tercero':rep.parte_tipo.toLowerCase().includes('tercero'),'pill-otro':!['actor','demandado','tercero'].some(t=>rep.parte_tipo.toLowerCase().includes(t))}" x-text="rep.parte_tipo||'PARTE'"></span>
                <span style="font-size:.82rem;color:var(--text-1);flex:1" x-text="rep.parte_nombre||'—'"></span>
                <span style="font-size:.82rem;font-weight:700;color:var(--brand)" class="mono" x-text="rep.total"></span>
                <span style="font-size:.65rem;color:var(--text-3)">exp.</span>
              </div>
            </template>
          </div>
        </div>
        <!-- Expedientes del abogado -->
        <div class="tbl-wrap">
          <table class="tbl">
            <thead>
              <tr>
                <th style="text-align:left">Número / Año</th>
                <th style="text-align:left">Carátula</th>
                <th style="text-align:left">Representa</th>
                <th style="text-align:center">Resultado</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(item,i) in (panelDer?.expedientes||[])" :key="i">
                <tr style="cursor:pointer" @click="verDetalle(item.exp.id)">
                  <td class="mono" style="font-size:.75rem;font-weight:600;white-space:nowrap" x-text="item.exp.numero+' / '+item.exp.anio"></td>
                  <td style="font-size:.73rem;color:var(--text-2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="(item.exp.caratula||'—').substring(0,40)"></td>
                  <td>
                    <span class="pill" :class="{'pill-actor':(item.parte_tipo||'').toLowerCase().includes('actor'),'pill-demandado':(item.parte_tipo||'').toLowerCase().includes('demandado'),'pill-tercero':(item.parte_tipo||'').toLowerCase().includes('tercero'),'pill-otro':!['actor','demandado','tercero'].some(t=>(item.parte_tipo||'').toLowerCase().includes(t))}" x-text="item.parte_tipo||'PARTE'"></span>
                  </td>
                  <td style="text-align:center">
                    <span class="badge" :class="{'badge-si':item.exp.caja_se_presenta==='Si','badge-no':item.exp.caja_se_presenta==='No','badge-err':!['Si','No'].includes(item.exp.caja_se_presenta)}" x-text="item.exp.caja_se_presenta||'—'"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    </template>

    <!-- ═══ VISTA USUARIOS ═══════════════════════════════════════════════ -->
    <template x-if="!cargando&&vista==='usuarios'">
    <div class="users-page">

      <!-- Crear usuario -->
      <div class="card" style="margin-bottom:20px;animation-delay:0ms">
        <div class="section-header">Nuevo usuario</div>
        <div style="padding:20px">
          <div style="display:flex;gap:12px;align-items:flex-end">
            <div class="form-group" style="flex:1;margin-bottom:0">
              <label class="form-label">Nombre de usuario</label>
              <input x-model="nuevoUser.username" type="text" class="inp" placeholder="ej: juan.perez">
            </div>
            <div class="form-group" style="flex:1;margin-bottom:0">
              <label class="form-label">Contraseña</label>
              <input x-model="nuevoUser.password" type="password" class="inp" placeholder="••••••••">

                <option value="admin">Admin</option>

            <button @click="crearUsuario()" :disabled="cargandoUsuarios" class="btn btn-primary">
              <span x-text="cargandoUsuarios?'Creando…':'Crear usuario'"></span>
            </button>
          </div>
          <div x-show="errorUsuario" style="margin-top:10px;padding:9px 13px;border-radius:var(--radius);font-size:.78rem;color:var(--red);background:var(--red-dim);border:1px solid #fca5a5" x-text="errorUsuario"></div>
        </div>

      <!-- Lista usuarios -->
      <div class="card" style="animation-delay:60ms">
        <div class="section-header">Usuarios registrados</div>
        <table class="tbl">
          <thead>
            <tr>
              <th style="text-align:left">Usuario</th>
              <th style="text-align:left">Rol</th>
              <th style="text-align:center">Expedientes asignados</th>
              <th style="text-align:center">Creado</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="u in usuarios" :key="u.id">
              <tr>
                <td>
                  <div style="font-weight:600;font-size:.82rem;color:var(--text-1)" x-text="u.username"></div>
                  <div x-show="u.id===currentUser?.user_id" style="font-size:.65rem;color:var(--brand);margin-top:1px">(tu cuenta)</div>
                </td>
                <td>
                  <span class="badge" :class="u.role==='admin'?'badge-err':''" style="font-size:.68rem" x-text="u.role==='admin'?'Administrador':'Usuario'"></span>
                </td>
                <td style="text-align:center;font-weight:700;color:var(--brand);font-size:.88rem" class="mono" x-text="u.asignados"></td>
                <td style="text-align:center;font-size:.73rem;color:var(--text-3)" class="mono" x-text="(u.created_at||'').substring(0,10)"></td>
                <td style="text-align:center">
                  <button x-show="u.id!==currentUser?.user_id"
                          @click="if(confirm('¿Eliminar al usuario '+u.username+'?'))eliminarUsuario(u.id)"
                          style="border:none;background:none;cursor:pointer;padding:5px;border-radius:5px;color:var(--text-3);transition:all 140ms"
                          onmouseover="this.style.background='var(--red-dim)';this.style.color='var(--red)'"
                          onmouseout="this.style.background='none';this.style.color='var(--text-3)'">
                    <svg style="width:14px;height:14px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                  </button>
                </td>
              </tr>
            </template>
            <tr x-show="usuarios.length===0">
              <td colspan="5" style="text-align:center;padding:48px;color:var(--text-3);font-size:.82rem">No hay usuarios.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- fin main content -->
