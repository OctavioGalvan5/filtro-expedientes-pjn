<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caja de Abogados — Salta · PJN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          colors: { gold: { DEFAULT:'#c9a53e', light:'#e8c76a', dark:'#9e7d25' } }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    html,body{height:100%;background:#f1f5f9;color:#1e293b;font-family:'Inter',sans-serif}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#e2e8f0}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:9999px}
    ::-webkit-scrollbar-thumb:hover{background:#94a3b8}
    .badge-si   {background:rgba(34,197,94,.15);color:#15803d;border:1px solid rgba(34,197,94,.3)}
    .badge-no   {background:rgba(239,68,68,.12); color:#dc2626;border:1px solid rgba(239,68,68,.25)}
    .badge-err  {background:rgba(234,179,8,.15); color:#b45309;border:1px solid rgba(234,179,8,.3)}
    .pill-actor    {background:rgba(59,130,246,.15);color:#1d4ed8}
    .pill-demandado{background:rgba(239,68,68,.12); color:#dc2626}
    .pill-tercero  {background:rgba(168,85,247,.12);color:#7e22ce}
    .pill-otro     {background:rgba(148,163,184,.15);color:#475569}
    .tbl-row{border-bottom:1px solid rgba(0,0,0,.06);transition:background .12s}
    .tbl-row:hover{background:rgba(0,0,0,.03)}
    .tbl-row.active{background:rgba(201,165,62,.08);border-left:3px solid #c9a53e}
    .tbl-head th{background:#f8fafc;position:sticky;top:0;z-index:10;
                 font-size:.68rem;font-weight:600;letter-spacing:.07em;
                 text-transform:uppercase;color:#94a3b8;padding:.6rem 1rem;
                 border-bottom:1px solid rgba(0,0,0,.07)}
    .stat-card{background:#ffffff;border:1px solid rgba(0,0,0,.07);border-radius:12px;padding:1rem 1.25rem;
               box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .stat-card .num{font-size:1.65rem;font-weight:700;line-height:1}
    .stat-card .lbl{font-size:.72rem;color:#94a3b8;margin-top:.25rem}
    .nav-btn{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;border-radius:8px;
             font-size:.83rem;font-weight:500;color:#64748b;cursor:pointer;transition:all .15s;
             border:none;background:transparent;width:100%}
    .nav-btn:hover{background:rgba(0,0,0,.04);color:#c9a53e}
    .nav-btn.active{background:rgba(201,165,62,.1);color:#9e7d25;border:1px solid rgba(201,165,62,.25)}
    .detail-panel{border-left:1px solid rgba(0,0,0,.08);background:#ffffff}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{animation:spin 1s linear infinite}
    .inp{background:#ffffff;border:1px solid #e2e8f0;border-radius:8px;
         padding:.45rem .85rem;font-size:.83rem;color:#1e293b;outline:none;transition:border-color .15s}
    .inp::placeholder{color:#94a3b8}
    .inp:focus{border-color:#c9a53e}
    select.inp{cursor:pointer}
    .btn-gold{background:linear-gradient(135deg,#c9a53e,#9e7d25);color:#fff;font-weight:600;
              border:none;border-radius:8px;padding:.55rem 1.25rem;font-size:.85rem;cursor:pointer;
              transition:opacity .15s}
    .btn-gold:hover{opacity:.9}
    .btn-gold:disabled{opacity:.5;cursor:not-allowed}
  </style>
</head>

<body class="flex h-full overflow-hidden" x-data="app()" x-init="init()" x-cloak>

<!-- ═══════════════════════ LOGIN ═════════════════════════════════════════ -->
<div x-show="pageState === 'login'"
     class="fixed inset-0 z-50 flex items-center justify-center"
     style="background:linear-gradient(135deg,#1e293b 0%,#334155 100%)">
  <div class="w-full max-w-sm mx-4">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="px-8 py-7" style="background:linear-gradient(135deg,#c9a53e,#9e7d25)">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center">
            <span class="text-white font-bold text-lg">⚖</span>
          </div>
          <div>
            <div class="font-bold text-white text-base leading-tight">Caja de Abogados</div>
            <div class="text-white/80 text-xs">Salta · PJN Scraper</div>
          </div>
        </div>
      </div>
      <form @submit.prevent="hacerLogin()" class="px-8 py-7 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Usuario</label>
          <input x-model="loginUser" type="text" autocomplete="username"
                 class="inp w-full" placeholder="Nombre de usuario"
                 :disabled="loginLoading">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Contraseña</label>
          <input x-model="loginPass" type="password" autocomplete="current-password"
                 class="inp w-full" placeholder="••••••••"
                 :disabled="loginLoading">
        </div>
        <div x-show="loginError" class="px-3 py-2 rounded-lg text-xs text-red-600"
             style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)"
             x-text="loginError"></div>
        <button type="submit" class="btn-gold w-full py-2.5" :disabled="loginLoading">
          <span x-show="!loginLoading">Ingresar</span>
          <span x-show="loginLoading">Ingresando...</span>
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ═══════════════════════ LOADING ══════════════════════════════════════ -->
<div x-show="pageState === 'loading'"
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100">
  <svg class="w-8 h-8 spinner text-gold" fill="none" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-opacity=".2"/>
    <path fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4l-3 3-3-3h4z"/>
  </svg>
</div>

<!-- ═══════════════════════ APP ════════════════════════════════════════════ -->
<template x-if="pageState === 'app'">
<div class="flex h-full overflow-hidden w-full">

<!-- ── SIDEBAR ──────────────────────────────────────────────────────────── -->
<aside class="flex flex-col w-56 flex-shrink-0 border-r border-slate-200" style="background:#ffffff">

  <div class="px-5 py-5 border-b border-slate-100">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
           style="background:linear-gradient(135deg,#c9a53e,#9e7d25)">
        <span class="text-black font-bold text-sm">⚖</span>
      </div>
      <div>
        <div class="font-bold text-slate-800 text-sm leading-tight">Caja de Abogados</div>
        <div class="text-xs font-medium" style="color:#c9a53e">Salta · PJN Scraper</div>
      </div>
    </div>
  </div>

  <nav class="flex flex-col gap-1 px-3 py-4 flex-1">
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-2 mb-1">Vistas</p>
    <button class="nav-btn" :class="vista==='expedientes' && 'active'"
            @click="vista='expedientes';panelDer=null;seleccionados=[];todosDelFiltro=false">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Expedientes
    </button>
    <button class="nav-btn" :class="vista==='abogados' && 'active'"
            @click="vista='abogados';panelDer=null;if(!abogados.length)cargarAbogados()">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Por Abogado
    </button>
    <!-- Solo admin -->
    <template x-if="currentUser?.role === 'admin'">
      <button class="nav-btn" :class="vista==='usuarios' && 'active'"
              @click="vista='usuarios';cargarUsuarios()">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        Usuarios
      </button>
    </template>
  </nav>

  <div class="px-3 py-3 border-t border-slate-100 space-y-2">
    <button @click="cargar()" class="nav-btn w-full" :disabled="cargando">
      <svg class="w-4 h-4 flex-shrink-0" :class="cargando && 'spinner'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      <span x-text="cargando ? 'Cargando...' : 'Actualizar datos'"></span>
    </button>
    <!-- Usuario actual -->
    <div class="px-2 py-2 rounded-lg" style="background:#f8fafc;border:1px solid #e2e8f0">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-xs font-semibold text-slate-700" x-text="currentUser?.username"></div>
          <div class="text-xs text-slate-400 capitalize" x-text="currentUser?.role === 'admin' ? 'Administrador' : 'Usuario'"></div>
        </div>
        <button @click="logout()" title="Cerrar sesión"
                class="text-slate-400 hover:text-red-500 transition-colors p-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</aside>

<!-- ── CONTENIDO PRINCIPAL ────────────────────────────────────────────── -->
<div class="flex flex-col flex-1 overflow-hidden">

  <!-- HEADER -->
  <header class="flex items-center justify-between px-6 py-3.5 border-b border-slate-200 flex-shrink-0"
          style="background:#ffffff">
    <div>
      <h1 class="font-semibold text-slate-800 text-base"
          x-text="vista==='expedientes' ? 'Expedientes analizados' : vista==='abogados' ? 'Por Abogado' : vista==='usuarios' ? 'Gestión de Usuarios' : 'Detalle de Expediente'"></h1>
      <p class="text-slate-400 text-xs mt-0.5"
         x-text="vista==='expedientes' ? totalExp+' expedientes · '+(stats.total||0)+' total'
                : vista==='abogados' ? abogados.length+' abogados encontrados'
                : vista==='usuarios' ? usuarios.length+' usuarios registrados'
                : (expedienteDetalle ? expedienteDetalle.numero+' / '+expedienteDetalle.anio : '')">
      </p>
    </div>
    <div class="flex items-center gap-5 text-sm" x-show="vista==='expedientes' || vista==='abogados'">
      <div class="text-center">
        <div class="font-bold text-slate-800" x-text="stats.si ?? '—'"></div>
        <div class="text-xs text-green-600">Presenta</div>
      </div>
      <div class="w-px h-6 bg-slate-200"></div>
      <div class="text-center">
        <div class="font-bold text-slate-800" x-text="stats.no ?? '—'"></div>
        <div class="text-xs text-red-500">No presenta</div>
      </div>
      <div class="w-px h-6 bg-slate-200"></div>
      <div class="text-center">
        <div class="font-bold text-slate-800" x-text="stats.total ?? '—'"></div>
        <div class="text-xs text-slate-400">Total</div>
      </div>
    </div>
  </header>

  <!-- STATS CARDS -->
  <div class="grid grid-cols-4 gap-3 px-5 py-3 border-b border-slate-200 flex-shrink-0"
       style="background:#f8fafc"
       x-show="vista==='expedientes' || vista==='abogados'">
    <div class="stat-card cursor-pointer transition-all hover:shadow-md"
         :class="filtroRes==='todos' && vista==='expedientes' && 'ring-2 ring-slate-300'"
         @click="if(vista==='expedientes'){ filtroRes='todos'; aplicarFiltros(); }">
      <div class="num text-slate-800" x-text="stats.total ?? '—'"></div>
      <div class="lbl" x-text="currentUser?.role==='admin' ? 'Total expedientes' : 'Mis expedientes'"></div>
    </div>
    <div class="stat-card cursor-pointer transition-all hover:shadow-md"
         style="border-color:rgba(34,197,94,.25)"
         :class="filtroRes==='Si' && 'ring-2 ring-green-400'"
         @click="if(vista==='expedientes'){ filtroRes = filtroRes==='Si' ? 'todos' : 'Si'; aplicarFiltros(); }">
      <div class="num text-green-600" x-text="stats.si ?? '—'"></div>
      <div class="lbl">Caja se presenta · <span class="text-green-600" x-text="(stats.pct_si||0)+'%'"></span></div>
    </div>
    <div class="stat-card cursor-pointer transition-all hover:shadow-md"
         style="border-color:rgba(239,68,68,.25)"
         :class="filtroRes==='No' && 'ring-2 ring-red-400'"
         @click="if(vista==='expedientes'){ filtroRes = filtroRes==='No' ? 'todos' : 'No'; aplicarFiltros(); }">
      <div class="num text-red-500" x-text="stats.no ?? '—'"></div>
      <div class="lbl">No se presenta · <span class="text-red-500" x-text="(stats.pct_no||0)+'%'"></span></div>
    </div>
    <div class="stat-card transition-all"
         x-show="vista==='expedientes'"
         style="border-color:rgba(234,179,8,.25)"
         :class="[stats.error > 0 && 'cursor-pointer hover:shadow-md', filtroRes==='error' && 'ring-2 ring-amber-400']"
         @click="if(stats.error > 0){ filtroRes = filtroRes==='error' ? 'todos' : 'error'; aplicarFiltros(); }">
      <div class="num text-amber-600" x-text="stats.error ?? '—'"></div>
      <div class="lbl">Error / Pendiente</div>
    </div>
    <div class="stat-card" x-show="vista==='abogados'" style="border-color:rgba(201,165,62,.25)">
      <div class="num" style="color:#c9a53e" x-text="abogados.length"></div>
      <div class="lbl">Abogados únicos</div>
    </div>
  </div>

  <!-- BODY -->
  <div class="flex flex-col flex-1 overflow-hidden">

    <!-- Spinner global -->
    <div x-show="cargando" class="flex items-center justify-center w-full flex-1">
      <div class="flex flex-col items-center gap-3 text-slate-400">
        <svg class="w-8 h-8 spinner" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-opacity=".2"/>
          <path fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4l-3 3-3-3h4z"/>
        </svg>
        <span class="text-sm">Cargando datos...</span>
      </div>
    </div>

    <!-- ════════ VISTA: EXPEDIENTES ═════════════════════════════════════════ -->
    <template x-if="!cargando && vista==='expedientes'">
      <div class="flex flex-col flex-1 overflow-hidden">

        <!-- Barra de asignación masiva (solo admin, cuando hay seleccionados) -->
        <template x-if="currentUser?.role==='admin' && (seleccionados.length > 0 || todosDelFiltro)">
          <div class="flex items-center gap-3 px-4 py-2 border-b border-amber-200 flex-shrink-0"
               style="background:rgba(201,165,62,.07)">
            <span class="text-xs font-semibold text-amber-700">
              <span x-show="!todosDelFiltro" x-text="seleccionados.length + ' seleccionado/s'"></span>
              <span x-show="todosDelFiltro" x-text="'Todos los '+totalExp+' del filtro seleccionados'"></span>
            </span>
            <span x-show="!todosDelFiltro && seleccionados.length < totalExp"
                  @click="todosDelFiltro=true;seleccionados=[]"
                  class="text-xs text-amber-600 underline cursor-pointer hover:text-amber-800">
              Seleccionar todos los <span x-text="totalExp"></span> del filtro
            </span>
            <div class="flex-1"></div>
            <select x-model="asignarA" class="inp text-xs py-1">
              <option value="">— Asignar a usuario —</option>
              <template x-for="u in usuariosLista" :key="u.id">
                <option :value="u.id" x-text="u.username + (u.role==='admin' ? ' (admin)' : '')"></option>
              </template>
            </select>
            <button @click="ejecutarAsignacion()"
                    :disabled="!asignarA || asignandoMasivo"
                    class="btn-gold py-1 px-3 text-xs">
              <span x-show="!asignandoMasivo">Asignar</span>
              <span x-show="asignandoMasivo">Asignando...</span>
            </button>
            <button @click="seleccionados=[];todosDelFiltro=false;asignarA=''"
                    class="text-xs text-slate-400 hover:text-slate-700 px-2 py-1 rounded hover:bg-slate-100">
              Limpiar
            </button>
          </div>
        </template>

        <!-- Filtros -->
        <div class="flex flex-col gap-2 px-4 py-2.5 border-b border-slate-200 flex-shrink-0" style="background:#f8fafc">
          <div class="flex items-center gap-2.5">
            <select x-model="filtroRes" @change="aplicarFiltros()" class="inp"
                    :class="filtroRes==='error' && 'border-amber-400 bg-amber-50 text-amber-700'">
              <option value="todos">Todos los resultados</option>
              <option value="Si">✓  Se presenta</option>
              <option value="No">✗  No se presenta</option>
              <option value="error">⚠  Error / Pendiente</option>
            </select>
            <select x-model="filtroJuzgado" @change="aplicarFiltros()" class="inp flex-1">
              <option value="">Todos los juzgados</option>
              <template x-for="j in juzgadosUnicos" :key="j">
                <option :value="j" x-text="j"></option>
              </template>
            </select>
            <select x-model="filtroSecretaria" @change="aplicarFiltros()" class="inp flex-1">
              <option value="">Todas las secretarías</option>
              <template x-for="s in secretariasUnicas" :key="s">
                <option :value="s" x-text="s"></option>
              </template>
            </select>
            <button @click="exportarExpedientes()"
                    title="Exportar Excel con los filtros actuales"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold flex-shrink-0 transition-colors"
                    style="background:rgba(34,197,94,.12);color:#15803d;border:1px solid rgba(34,197,94,.25)">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
              Exportar Excel
            </button>
          </div>
          <div class="relative">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input x-model="filtroTxt" type="text" class="inp w-full pl-8"
                   placeholder="Buscar número, carátula, parte, abogado…"
                   @input.debounce.400ms="aplicarFiltros()"/>
          </div>

          <div class="flex items-center gap-2.5">
            <button @click="filtroConDemanda = !filtroConDemanda; aplicarFiltros()"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors flex-shrink-0"
                    :class="filtroConDemanda ? 'border border-blue-300 text-blue-700' : 'border border-slate-200 text-slate-500 hover:border-slate-300'"
                    :style="filtroConDemanda ? 'background:rgba(59,130,246,.1)' : 'background:#fff'">
              Con demanda
            </button>
            <div class="flex items-center gap-1.5 flex-1">
              <span class="text-xs text-slate-400 flex-shrink-0">F. Inicio:</span>
              <input type="date" x-model="filtroFechaDesde" @change="aplicarFiltros()" class="inp text-xs flex-1">
              <span class="text-xs text-slate-300">—</span>
              <input type="date" x-model="filtroFechaHasta" @change="aplicarFiltros()" class="inp text-xs flex-1">
              <button x-show="filtroFechaDesde || filtroFechaHasta"
                      @click="filtroFechaDesde=''; filtroFechaHasta=''; aplicarFiltros()"
                      class="text-slate-400 hover:text-slate-600 flex-shrink-0 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Filtros participante -->
          <div class="flex items-center gap-2"
               x-show="participantes.actor.length || participantes.demandado.length || participantes.tercero.length">
            <div class="relative flex-1" x-show="participantes.actor.length"
                 @click.outside="if(dropdownAbierto==='actor') dropdownAbierto=null">
              <button @click="dropdownAbierto = dropdownAbierto==='actor' ? null : 'actor'"
                      class="inp w-full flex items-center justify-between gap-1.5"
                      :class="filtroActores.length && 'border-blue-300 bg-blue-50'">
                <span class="text-xs text-slate-500 truncate">Actores
                  <template x-if="filtroActores.length">
                    <span class="font-semibold text-blue-600" x-text="' ('+filtroActores.length+')'"></span>
                  </template>
                </span>
                <svg class="w-3 h-3 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
              <div x-show="dropdownAbierto==='actor'"
                   class="absolute z-50 top-full mt-1 left-0 w-72 bg-white rounded-xl shadow-xl border border-slate-200 flex flex-col overflow-hidden">
                <div class="p-2 border-b border-slate-100">
                  <input x-model="buscarPart.actor" type="text" placeholder="Buscar actor…" @click.stop class="inp w-full text-xs py-1">
                </div>
                <div class="overflow-y-auto max-h-52">
                  <template x-for="n in partFiltrada('actor')" :key="n">
                    <label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-slate-50 cursor-pointer select-none">
                      <input type="checkbox" :value="n" x-model="filtroActores" @change="aplicarFiltros()" class="rounded border-slate-300">
                      <span class="text-xs text-slate-700 truncate" x-text="n"></span>
                    </label>
                  </template>
                </div>
                <div x-show="filtroActores.length" class="px-3 py-1.5 border-t border-slate-100 flex items-center justify-between">
                  <span class="text-xs text-slate-400" x-text="filtroActores.length+' seleccionado/s'"></span>
                  <button @click="filtroActores=[]; aplicarFiltros()" class="text-xs text-red-500 hover:text-red-700">Limpiar</button>
                </div>
              </div>
            </div>

            <div class="relative flex-1" x-show="participantes.demandado.length"
                 @click.outside="if(dropdownAbierto==='demandado') dropdownAbierto=null">
              <button @click="dropdownAbierto = dropdownAbierto==='demandado' ? null : 'demandado'"
                      class="inp w-full flex items-center justify-between gap-1.5"
                      :class="filtroDemandados.length && 'border-red-300 bg-red-50'">
                <span class="text-xs text-slate-500 truncate">Demandados
                  <template x-if="filtroDemandados.length">
                    <span class="font-semibold text-red-600" x-text="' ('+filtroDemandados.length+')'"></span>
                  </template>
                </span>
                <svg class="w-3 h-3 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
              <div x-show="dropdownAbierto==='demandado'"
                   class="absolute z-50 top-full mt-1 left-0 w-72 bg-white rounded-xl shadow-xl border border-slate-200 flex flex-col overflow-hidden">
                <div class="p-2 border-b border-slate-100">
                  <input x-model="buscarPart.demandado" type="text" placeholder="Buscar demandado…" @click.stop class="inp w-full text-xs py-1">
                </div>
                <div class="overflow-y-auto max-h-52">
                  <template x-for="n in partFiltrada('demandado')" :key="n">
                    <label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-slate-50 cursor-pointer select-none">
                      <input type="checkbox" :value="n" x-model="filtroDemandados" @change="aplicarFiltros()" class="rounded border-slate-300">
                      <span class="text-xs text-slate-700 truncate" x-text="n"></span>
                    </label>
                  </template>
                </div>
                <div x-show="filtroDemandados.length" class="px-3 py-1.5 border-t border-slate-100 flex items-center justify-between">
                  <span class="text-xs text-slate-400" x-text="filtroDemandados.length+' seleccionado/s'"></span>
                  <button @click="filtroDemandados=[]; aplicarFiltros()" class="text-xs text-red-500 hover:text-red-700">Limpiar</button>
                </div>
              </div>
            </div>

            <div class="relative flex-1" x-show="participantes.tercero.length"
                 @click.outside="if(dropdownAbierto==='tercero') dropdownAbierto=null">
              <button @click="dropdownAbierto = dropdownAbierto==='tercero' ? null : 'tercero'"
                      class="inp w-full flex items-center justify-between gap-1.5"
                      :class="filtroTerceros.length && 'border-purple-300 bg-purple-50'">
                <span class="text-xs text-slate-500 truncate">Terceros
                  <template x-if="filtroTerceros.length">
                    <span class="font-semibold text-purple-600" x-text="' ('+filtroTerceros.length+')'"></span>
                  </template>
                </span>
                <svg class="w-3 h-3 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
              <div x-show="dropdownAbierto==='tercero'"
                   class="absolute z-50 top-full mt-1 left-0 w-72 bg-white rounded-xl shadow-xl border border-slate-200 flex flex-col overflow-hidden">
                <div class="p-2 border-b border-slate-100">
                  <input x-model="buscarPart.tercero" type="text" placeholder="Buscar tercero…" @click.stop class="inp w-full text-xs py-1">
                </div>
                <div class="overflow-y-auto max-h-52">
                  <template x-for="n in partFiltrada('tercero')" :key="n">
                    <label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-slate-50 cursor-pointer select-none">
                      <input type="checkbox" :value="n" x-model="filtroTerceros" @change="aplicarFiltros()" class="rounded border-slate-300">
                      <span class="text-xs text-slate-700 truncate" x-text="n"></span>
                    </label>
                  </template>
                </div>
                <div x-show="filtroTerceros.length" class="px-3 py-1.5 border-t border-slate-100 flex items-center justify-between">
                  <span class="text-xs text-slate-400" x-text="filtroTerceros.length+' seleccionado/s'"></span>
                  <button @click="filtroTerceros=[]; aplicarFiltros()" class="text-xs text-red-500 hover:text-red-700">Limpiar</button>
                </div>
              </div>
            </div>

            <button x-show="filtroActores.length || filtroDemandados.length || filtroTerceros.length"
                    @click="filtroActores=[]; filtroDemandados=[]; filtroTerceros=[]; aplicarFiltros()"
                    class="flex-shrink-0 text-xs px-2.5 py-1.5 rounded-lg border border-red-200 text-red-500 hover:bg-red-50 transition-colors">
              Limpiar todo
            </button>
          </div>
        </div>

        <!-- Tabla -->
        <div class="overflow-y-auto flex-1">
          <table class="w-full text-sm">
            <thead class="tbl-head">
              <tr>
                <!-- Checkbox columna (solo admin) -->
                <template x-if="currentUser?.role==='admin'">
                  <th class="px-3 w-8">
                    <input type="checkbox"
                           :checked="seleccionados.length === expedientesPagina.length && expedientesPagina.length > 0"
                           @change="toggleSeleccionarPagina($event)"
                           class="rounded border-slate-300 cursor-pointer">
                  </th>
                </template>
                <th class="text-left">Número / Año</th>
                <th class="text-left">Actor</th>
                <th class="text-left">Demandado</th>
                <th class="text-center">Resultado</th>
                <th class="text-center">F. Inicio</th>
                <th class="text-center">Demanda</th>
                <template x-if="currentUser?.role==='admin'">
                  <th class="text-center w-8"></th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="exp in expedientesPagina" :key="exp.id">
                <tr class="tbl-row cursor-pointer"
                    :class="seleccionados.includes(exp.id) && 'bg-amber-50'"
                    @click="verDetalle(exp.id)">
                  <!-- Checkbox (solo admin) -->
                  <template x-if="currentUser?.role==='admin'">
                    <td class="px-3 py-2.5" @click.stop>
                      <input type="checkbox" :value="exp.id" x-model="seleccionados"
                             @change="todosDelFiltro=false"
                             class="rounded border-slate-300 cursor-pointer">
                    </td>
                  </template>
                  <td class="px-4 py-2.5 whitespace-nowrap">
                    <div class="font-mono text-slate-700 text-xs font-semibold" x-text="exp.numero + ' / ' + exp.anio"></div>
                    <div class="text-slate-400 text-xs mt-0.5 truncate max-w-[140px]"
                         x-text="(exp.caratula||'').substring(0,40)"></div>
                  </td>
                  <td class="px-4 py-2.5 text-slate-600 text-xs">
                    <span x-text="getParte(exp,'actor')" class="truncate block max-w-[160px]"></span>
                  </td>
                  <td class="px-4 py-2.5 text-slate-600 text-xs">
                    <span x-text="getParte(exp,'demandado')" class="truncate block max-w-[160px]"></span>
                  </td>
                  <td class="px-4 py-2.5 text-center">
                    <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                          :class="{'badge-si':exp.caja_se_presenta==='Si','badge-no':exp.caja_se_presenta==='No','badge-err':!['Si','No'].includes(exp.caja_se_presenta)}"
                          x-text="exp.caja_se_presenta||'—'"></span>
                  </td>
                  <td class="px-4 py-2.5 text-slate-500 text-xs font-mono text-center"
                      x-text="exp.fecha_inicio || '—'"></td>
                  <td class="px-2 py-2.5 text-center" @click.stop>
                    <a x-show="exp.url_demanda && exp.url_demanda !== 'NINGUNA'"
                       :href="exp.url_demanda" target="_blank"
                       class="inline-flex items-center justify-center p-1 rounded hover:bg-blue-50 text-slate-400 hover:text-blue-600 transition-colors">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                      </svg>
                    </a>
                    <span x-show="!exp.url_demanda || exp.url_demanda === 'NINGUNA'" class="text-slate-200 text-xs">—</span>
                  </td>
                  <!-- Botón eliminar (solo admin) -->
                  <template x-if="currentUser?.role==='admin'">
                    <td class="px-2 py-2.5 text-center" @click.stop>
                      <button @click="eliminarExpediente(exp.id)"
                              title="Eliminar"
                              class="p-1.5 rounded hover:bg-red-50 text-slate-300 hover:text-red-500 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                      </button>
                    </td>
                  </template>
                </tr>
              </template>
              <tr x-show="expedientesPagina.length===0">
                <td colspan="8" class="px-4 py-12 text-center text-slate-400 text-sm">
                  Ningún expediente coincide con el filtro.
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Paginación -->
        <div class="flex items-center justify-between px-4 py-2 border-t border-slate-200 flex-shrink-0 text-xs text-slate-500" style="background:#f8fafc">
          <button @click="paginaAnterior()" :disabled="paginaActual <= 1"
                  class="px-3 py-1 rounded border border-slate-200 hover:bg-slate-100 disabled:opacity-30 disabled:cursor-not-allowed">
            ◀ Anterior
          </button>
          <span x-text="`Página ${paginaActual} de ${totalPaginas}  ·  ${totalExp} expedientes`"></span>
          <button @click="paginaSiguiente()" :disabled="paginaActual >= totalPaginas"
                  class="px-3 py-1 rounded border border-slate-200 hover:bg-slate-100 disabled:opacity-30 disabled:cursor-not-allowed">
            Siguiente ▶
          </button>
        </div>

      </div>
    </template>

    <!-- ════════ VISTA: DETALLE ═════════════════════════════════════════════ -->
    <template x-if="!cargando && vista==='detalle'">
      <div class="flex-1 overflow-y-auto bg-white" x-show="expedienteDetalle">
        <div class="max-w-4xl mx-auto px-6 py-6">

          <!-- Back -->
          <button @click="vista='expedientes'; expedienteDetalle=null"
                  class="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 mb-5 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Volver a expedientes
          </button>

          <!-- Header -->
          <div class="flex items-start justify-between mb-6">
            <div>
              <div class="flex items-center gap-3 flex-wrap">
                <h2 class="font-mono font-bold text-slate-800 text-2xl"
                    x-text="expedienteDetalle?.numero + ' / ' + expedienteDetalle?.anio"></h2>
                <span class="px-2.5 py-0.5 rounded-full text-sm font-semibold"
                      :class="{'badge-si':expedienteDetalle?.caja_se_presenta==='Si','badge-no':expedienteDetalle?.caja_se_presenta==='No','badge-err':!['Si','No'].includes(expedienteDetalle?.caja_se_presenta||'')}"
                      x-text="'Caja: '+(expedienteDetalle?.caja_se_presenta||'—')"></span>
              </div>
              <p class="text-slate-500 mt-1 text-sm" x-text="expedienteDetalle?.caratula||'—'"></p>
            </div>
            <template x-if="currentUser?.role==='admin'">
              <button @click="if(confirm('¿Eliminar este expediente permanentemente?')) eliminarExpedienteDetalle()"
                      class="text-slate-300 hover:text-red-500 transition-colors p-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </template>
          </div>

          <div class="grid grid-cols-2 gap-6">

            <!-- Columna izquierda: info + participantes -->
            <div class="space-y-5">

              <!-- Info jurisdiccional -->
              <div class="rounded-xl border border-slate-100 overflow-hidden">
                <div class="px-4 py-2.5 border-b border-slate-100" style="background:#f8fafc">
                  <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Información del expediente</span>
                </div>
                <div class="px-4 py-3 space-y-2">
                  <template x-for="[lbl, val] in [
                    ['Jurisdicción', expedienteDetalle?.jurisdiccion],
                    ['Juzgado', expedienteDetalle?.juzgado],
                    ['Secretaría', expedienteDetalle?.secretaria],
                    ['F. Inicio', expedienteDetalle?.fecha_inicio],
                    ['F. Demanda', expedienteDetalle?.fecha_demanda],
                    ['F. Análisis', (expedienteDetalle?.fecha_analisis||'').substring(0,10)],
                    ['Fuente', expedienteDetalle?.fuente],
                  ]" :key="lbl">
                    <div x-show="val" class="flex items-start gap-2 text-xs">
                      <span class="font-semibold text-slate-400 uppercase tracking-wide w-24 flex-shrink-0 pt-0.5" style="font-size:.6rem" x-text="lbl"></span>
                      <span class="text-slate-700 font-mono" x-text="val"></span>
                    </div>
                  </template>
                  <div x-show="expedienteDetalle?.detalle_demanda" class="flex items-start gap-2 text-xs">
                    <span class="font-semibold text-slate-400 uppercase tracking-wide w-24 flex-shrink-0 pt-0.5" style="font-size:.6rem">Detalle</span>
                    <span class="text-slate-700 leading-snug" x-text="expedienteDetalle?.detalle_demanda"></span>
                  </div>
                  <div x-show="expedienteDetalle?.url_demanda && expedienteDetalle?.url_demanda !== 'NINGUNA'"
                       class="flex items-center gap-2 text-xs">
                    <span class="font-semibold text-slate-400 uppercase tracking-wide w-24 flex-shrink-0" style="font-size:.6rem">Demanda</span>
                    <a :href="expedienteDetalle?.url_demanda" target="_blank"
                       class="text-blue-500 hover:text-blue-700 transition-colors flex items-center gap-1">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                      </svg>
                      Ver documento
                    </a>
                  </div>
                </div>
              </div>

              <!-- Participantes -->
              <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                  Intervinientes (<span x-text="(expedienteDetalle?.participantes||[]).length"></span>)
                </p>
                <div class="space-y-2">
                  <template x-for="parte in (expedienteDetalle?.participantes||[])" :key="parte.id">
                    <div class="rounded-xl overflow-hidden border border-slate-100" style="background:#f8fafc">
                      <div class="px-4 py-3 flex items-center gap-2.5">
                        <span class="px-1.5 py-0.5 rounded text-xs font-bold uppercase"
                              :class="{'pill-actor':(parte.tipo||'').toLowerCase().includes('actor'),'pill-demandado':(parte.tipo||'').toLowerCase().includes('demandado'),'pill-tercero':(parte.tipo||'').toLowerCase().includes('tercero'),'pill-otro':!['actor','demandado','tercero'].some(t=>(parte.tipo||'').toLowerCase().includes(t))}"
                              x-text="parte.tipo||'PARTE'"></span>
                        <span class="text-slate-800 text-sm font-medium" x-text="parte.nombre"></span>
                      </div>
                      <div class="border-t border-slate-100">
                        <template x-if="!(parte.abogados||[]).length">
                          <div class="px-4 py-2 text-xs text-slate-400 italic">Sin abogados registrados</div>
                        </template>
                        <template x-for="ab in (parte.abogados||[])" :key="ab.id">
                          <div class="flex items-start gap-3 px-4 py-2.5 border-t border-slate-50 hover:bg-slate-50 transition-colors">
                            <svg class="w-3.5 h-3.5 text-slate-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <div>
                              <div class="text-slate-700 text-xs font-medium" x-text="ab.nombre"></div>
                              <div class="flex flex-wrap gap-x-3 mt-0.5">
                                <span x-show="ab.tomo_folio" class="text-xs text-slate-400 font-mono" x-text="'T/F: '+ab.tomo_folio"></span>
                                <span x-show="ab.cuit" class="text-xs text-slate-400 font-mono" x-text="'CUIT: '+ab.cuit"></span>
                              </div>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                  <div x-show="!(expedienteDetalle?.participantes||[]).length"
                       class="text-center text-slate-400 text-sm py-6">Sin intervinientes registrados</div>
                </div>
              </div>
            </div>

            <!-- Columna derecha: formulario objeto/monto -->
            <div class="space-y-5">
              <div class="rounded-xl border border-slate-200 overflow-hidden">
                <div class="px-4 py-3 border-b border-slate-100" style="background:#f8fafc">
                  <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Datos de la demanda</span>
                </div>
                <div class="px-4 py-4 space-y-4">
                  <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Objeto</label>
                    <textarea x-model="detalleObjeto" rows="4"
                              class="inp w-full resize-none leading-snug"
                              placeholder="Describí el objeto de la demanda…"></textarea>
                  </div>
                  <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Monto de la demanda</label>
                    <div class="relative">
                      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-semibold">$</span>
                      <input x-model="detalleMonto" type="number" min="0" step="0.01"
                             class="inp w-full pl-7"
                             placeholder="0.00">
                    </div>
                  </div>
                  <div class="flex items-center gap-3">
                    <button @click="guardarDetalle()"
                            :disabled="guardandoDetalle"
                            class="btn-gold flex-1 py-2">
                      <span x-show="!guardandoDetalle && !detalleGuardado">Guardar</span>
                      <span x-show="guardandoDetalle">Guardando...</span>
                      <span x-show="!guardandoDetalle && detalleGuardado">✓ Guardado</span>
                    </button>
                  </div>
                  <div x-show="detalleGuardado"
                       class="text-xs text-green-600 text-center"
                       style="margin-top:.25rem">
                    Datos guardados correctamente
                  </div>
                </div>
              </div>

              <!-- Campos guardados (lectura) -->
              <div x-show="expedienteDetalle?.objeto || expedienteDetalle?.monto_demanda"
                   class="rounded-xl border border-slate-100 px-4 py-3 space-y-2" style="background:#f8fafc">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Datos registrados anteriormente</p>
                <div x-show="expedienteDetalle?.objeto" class="text-xs text-slate-600">
                  <span class="font-semibold text-slate-400 block mb-0.5">Objeto:</span>
                  <span x-text="expedienteDetalle?.objeto"></span>
                </div>
                <div x-show="expedienteDetalle?.monto_demanda" class="text-xs text-slate-600">
                  <span class="font-semibold text-slate-400">Monto: </span>
                  <span class="font-mono" x-text="'$ ' + Number(expedienteDetalle?.monto_demanda).toLocaleString('es-AR', {minimumFractionDigits:2})"></span>
                </div>
              </div>
            </div>

          </div>
        </div>

<!-- ═══════════════════════ JAVASCRIPT ════════════════════════════════════ -->
<script>
function app() {
  return {
    // Auth
    pageState: 'loading',
    currentUser: null,
    token: null,
    loginUser: '',
    loginPass: '',
    loginError: '',
    loginLoading: false,

    // Vista
    vista: 'expedientes',
    cargando: true,
    cargandoAb: false,
    panelDer: null,

    // Stats y expedientes
    stats: { total:0, si:0, no:0, error:0, pct_si:0, pct_no:0, juzgados:[], secretarias:[] },
    expedientesPagina: [],
    totalExp: 0,
    paginaActual: 1,
    porPagina: 50,

    // Filtros expedientes
    filtroRes: 'todos',
    filtroTxt: '',
    filtroJuzgado: '',
    filtroSecretaria: '',
    filtroConDemanda: false,
    filtroFechaDesde: '',
    filtroFechaHasta: '',

    // Filtros participante
    participantes: { actor: [], demandado: [], tercero: [] },
    filtroActores: [],
    filtroDemandados: [],
    filtroTerceros: [],
    dropdownAbierto: null,
    buscarPart: { actor: '', demandado: '', tercero: '' },

    // Abogados
    abogados: [],
    filtroAb: '',
    filtroRepresenta: '',
    ordenAb: 'total',

    // Asignación masiva (solo admin)
    seleccionados: [],
    todosDelFiltro: false,
    asignarA: '',
    asignandoMasivo: false,
    usuariosLista: [],

    // Detalle expediente
    expedienteDetalle: null,
    detalleObjeto: '',
    detalleMonto: '',
    guardandoDetalle: false,
    detalleGuardado: false,

    // Usuarios
    usuarios: [],
    cargandoUsuarios: false,
    errorUsuario: '',
    nuevoUser: { username: '', password: '', role: 'normal' },

    /* ── helpers ── */
    h(extra) {
      const headers = { 'Content-Type': 'application/json' };
      if (this.token) headers['Authorization'] = 'Bearer ' + this.token;
      return Object.assign(headers, extra || {});
    },

    async apiFetch(url, opts = {}) {
      if (!opts.headers) opts.headers = {};
      if (this.token) opts.headers['Authorization'] = 'Bearer ' + this.token;
      const r = await fetch(url, opts);
      if (r.status === 401) { this.logout(); return null; }
      return r;
    },

    /* ── AUTH ── */
    async init() {
      this.token = localStorage.getItem('pjn_token');
      if (this.token) {
        try {
          const r = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + this.token } });
          if (r.ok) {
            this.currentUser = await r.json();
            this.pageState = 'app';
            await this.cargar();
            return;
          }
        } catch(e) {}
      }
      this.token = null;
      localStorage.removeItem('pjn_token');
      this.pageState = 'login';
    },

    async hacerLogin() {
      this.loginError = '';
      if (!this.loginUser || !this.loginPass) { this.loginError = 'Completá usuario y contraseña'; return; }
      this.loginLoading = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: this.loginUser, password: this.loginPass })
        });
        if (!r.ok) {
          const err = await r.json();
          this.loginError = err.detail || 'Error al ingresar';
          return;
        }
        const data = await r.json();
        this.token = data.access_token;
        this.currentUser = { user_id: data.user_id, username: data.username, role: data.role };
        localStorage.setItem('pjn_token', this.token);
        this.pageState = 'app';
        await this.cargar();
        if (this.currentUser.role === 'admin') await this.cargarUsuariosLista();
      } catch(e) {
        this.loginError = 'Error de conexión';
      } finally {
        this.loginLoading = false;
      }
    },

    logout() {
      this.token = null;
      this.currentUser = null;
      localStorage.removeItem('pjn_token');
      this.pageState = 'login';
      this.loginUser = '';
      this.loginPass = '';
    },

    /* ── DATOS ── */
    async cargar() {
      this.cargando = true;
      this.panelDer = null;
      try {
        const r = await this.apiFetch('/api/stats');
        if (r) this.stats = await r.json();
        await this.cargarExpedientes();
        const rp = await this.apiFetch('/api/participantes');
        if (rp) this.participantes = await rp.json();
        if (this.currentUser?.role === 'admin') await this.cargarUsuariosLista();
      } catch (err) { console.error(err); }
      this.cargando = false;
    },

    async cargarExpedientes() {
      const p = new URLSearchParams({ pagina: this.paginaActual, por_pagina: this.porPagina });
      if (this.filtroRes !== 'todos')       p.set('resultado',   this.filtroRes);
      if (this.filtroJuzgado)               p.set('juzgado',     this.filtroJuzgado);
      if (this.filtroSecretaria)            p.set('secretaria',  this.filtroSecretaria);
      if (this.filtroTxt)                   p.set('busqueda',    this.filtroTxt);
      if (this.filtroActores.length)        p.set('actores',     this.filtroActores.join(','));
      if (this.filtroDemandados.length)     p.set('demandados',  this.filtroDemandados.join(','));
      if (this.filtroTerceros.length)       p.set('terceros',    this.filtroTerceros.join(','));
      if (this.filtroConDemanda)            p.set('con_demanda', '1');
      if (this.filtroFechaDesde)            p.set('fecha_desde', this.filtroFechaDesde);
      if (this.filtroFechaHasta)            p.set('fecha_hasta', this.filtroFechaHasta);
      const r = await this.apiFetch('/api/expedientes?' + p);
      if (!r) return;
      const data = await r.json();
      this.expedientesPagina = data.items;
      this.totalExp = data.total;
    },

    async cargarAbogados() {
      this.cargandoAb = true;
      try {
        const p = new URLSearchParams();
        if (this.filtroAb)         p.set('filtro_ab', this.filtroAb);
        if (this.filtroRepresenta) p.set('filtro_representa', this.filtroRepresenta);
        const r = await this.apiFetch('/api/abogados?' + p);
        if (!r) return;
        let data = await r.json();
        if (this.ordenAb === 'nombre') data = [...data].sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
        else if (this.ordenAb === 'si') data = [...data].sort((a,b) => b.si - a.si);
        this.abogados = data;
      } catch (err) { console.error(err); }
      this.cargandoAb = false;
    },

    async aplicarFiltros() {
      this.paginaActual = 1;
      this.seleccionados = [];
      this.todosDelFiltro = false;
      await this.cargarExpedientes();
    },

    get totalPaginas() { return Math.max(1, Math.ceil(this.totalExp / this.porPagina)); },

    async paginaAnterior() {
      if (this.paginaActual > 1) { this.paginaActual--; await this.cargarExpedientes(); }
    },
    async paginaSiguiente() {
      if (this.paginaActual < this.totalPaginas) { this.paginaActual++; await this.cargarExpedientes(); }
    },

    get juzgadosUnicos()    { return this.stats.juzgados    || []; },
    get secretariasUnicas() { return this.stats.secretarias || []; },

    partFiltrada(tipo) {
      const lista = this.participantes[tipo] || [];
      const b = (this.buscarPart[tipo] || '').toLowerCase();
      return b ? lista.filter(n => n.toLowerCase().includes(b)) : lista;
    },

    getParte(exp, tipo) {
      const p = (exp.participantes||[]).find(p => (p.tipo||'').toLowerCase().includes(tipo));
      if (!p || !p.nombre) return '—';
      return p.nombre.length > 32 ? p.nombre.substring(0, 32) + '…' : p.nombre;
    },

    /* ── DETALLE ── */
    async verDetalle(id) {
      this.expedienteDetalle = null;
      this.detalleObjeto = '';
      this.detalleMonto = '';
      this.detalleGuardado = false;
      this.vista = 'detalle';
      this.cargando = true;
      try {
        const r = await this.apiFetch(`/api/expedientes/${id}`);
        if (!r) return;
        if (!r.ok) { alert('No se pudo cargar el expediente'); this.vista = 'expedientes'; return; }
        this.expedienteDetalle = await r.json();
        this.detalleObjeto = this.expedienteDetalle.objeto || '';
        this.detalleMonto = this.expedienteDetalle.monto_demanda != null ? String(this.expedienteDetalle.monto_demanda) : '';
      } catch(e) { console.error(e); }
      this.cargando = false;
    },

    async guardarDetalle() {
      if (!this.expedienteDetalle) return;
      this.guardandoDetalle = true;
      this.detalleGuardado = false;
      try {
        const r = await this.apiFetch(`/api/expedientes/${this.expedienteDetalle.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            objeto: this.detalleObjeto || null,
            monto_demanda: this.detalleMonto !== '' ? parseFloat(this.detalleMonto) : null
          })
        });
        if (r && r.ok) {
          this.detalleGuardado = true;
          this.expedienteDetalle.objeto = this.detalleObjeto || null;
          this.expedienteDetalle.monto_demanda = this.detalleMonto !== '' ? parseFloat(this.detalleMonto) : null;
          setTimeout(() => { this.detalleGuardado = false; }, 3000);
        }
      } catch(e) { console.error(e); }
      this.guardandoDetalle = false;
    },

    async eliminarExpedienteDetalle() {
      if (!this.expedienteDetalle) return;
      const r = await this.apiFetch(`/api/expedientes/${this.expedienteDetalle.id}`, { method: 'DELETE' });
      if (r && r.ok) {
        this.expedienteDetalle = null;
        this.vista = 'expedientes';
        this.stats = await this.apiFetch('/api/stats').then(r => r?.json());
        await this.cargarExpedientes();
      }
    },

    /* ── ASIGNACIÓN ── */
    toggleSeleccionarPagina(e) {
      if (e.target.checked) {
        const ids = this.expedientesPagina.map(x => x.id);
        this.seleccionados = [...new Set([...this.seleccionados, ...ids])];
      } else {
        const ids = new Set(this.expedientesPagina.map(x => x.id));
        this.seleccionados = this.seleccionados.filter(id => !ids.has(id));
        this.todosDelFiltro = false;
      }
    },

    async ejecutarAsignacion() {
      if (!this.asignarA) return;
      this.asignandoMasivo = true;
      try {
        let r;
        if (this.todosDelFiltro) {
          const body = {
            user_id: parseInt(this.asignarA),
            resultado: this.filtroRes === 'todos' ? '' : this.filtroRes,
            juzgado: this.filtroJuzgado,
            secretaria: this.filtroSecretaria,
            busqueda: this.filtroTxt,
            actores: this.filtroActores.join(','),
            demandados: this.filtroDemandados.join(','),
            terceros: this.filtroTerceros.join(','),
            con_demanda: this.filtroConDemanda,
            fecha_desde: this.filtroFechaDesde,
            fecha_hasta: this.filtroFechaHasta,
          };
          r = await this.apiFetch('/api/asignar-filtro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        } else {
          r = await this.apiFetch('/api/asignar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: parseInt(this.asignarA), expediente_ids: this.seleccionados })
          });
        }
        if (r && r.ok) {
          const data = await r.json();
          alert(`Se asignaron ${data.asignados} expediente/s correctamente.`);
          this.seleccionados = [];
          this.todosDelFiltro = false;
          this.asignarA = '';
          await this.cargarUsuarios();
        }
      } catch(e) { console.error(e); }
      this.asignandoMasivo = false;
    },

    /* ── USUARIOS ── */
    async cargarUsuariosLista() {
      try {
        const r = await this.apiFetch('/api/users');
        if (r && r.ok) {
          const data = await r.json();
          this.usuariosLista = data.map(u => ({ id: u.id, username: u.username, role: u.role }));
        }
      } catch(e) {}
    },

    async cargarUsuarios() {
      this.cargandoUsuarios = true;
      try {
        const r = await this.apiFetch('/api/users');
        if (r && r.ok) {
          this.usuarios = await r.json();
          this.usuariosLista = this.usuarios.map(u => ({ id: u.id, username: u.username, role: u.role }));
        }
      } catch(e) {}
      this.cargandoUsuarios = false;
    },

    async crearUsuario() {
      this.errorUsuario = '';
      if (!this.nuevoUser.username.trim()) { this.errorUsuario = 'El nombre de usuario es obligatorio'; return; }
      if (!this.nuevoUser.password) { this.errorUsuario = 'La contraseña es obligatoria'; return; }
      this.cargandoUsuarios = true;
      try {
        const r = await this.apiFetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.nuevoUser)
        });
        if (!r) return;
        if (!r.ok) {
          const err = await r.json();
          this.errorUsuario = err.detail || 'Error al crear usuario';
        } else {
          this.nuevoUser = { username: '', password: '', role: 'normal' };
          await this.cargarUsuarios();
        }
      } catch(e) { this.errorUsuario = 'Error de conexión'; }
      this.cargandoUsuarios = false;
    },

    async eliminarUsuario(id) {
      try {
        const r = await this.apiFetch(`/api/users/${id}`, { method: 'DELETE' });
        if (r && r.ok) await this.cargarUsuarios();
      } catch(e) {}
    },

    /* ── ELIMINAR EXPEDIENTE (lista) ── */
    async eliminarExpediente(id) {
      if (!confirm('¿Eliminar este expediente permanentemente?')) return;
      const r = await this.apiFetch(`/api/expedientes/${id}`, { method: 'DELETE' });
      if (r && r.ok) {
        const rs = await this.apiFetch('/api/stats');
        if (rs) this.stats = await rs.json();
        await this.cargarExpedientes();
      }
    },

    /* ── EXPORT ── */
    exportarExpedientes() {
      const p = new URLSearchParams();
      if (this.filtroRes !== 'todos')   p.set('resultado',  this.filtroRes);
      if (this.filtroJuzgado)           p.set('juzgado',    this.filtroJuzgado);
      if (this.filtroSecretaria)        p.set('secretaria', this.filtroSecretaria);
      if (this.filtroTxt)               p.set('busqueda',   this.filtroTxt);
      if (this.filtroActores.length)    p.set('actores',    this.filtroActores.join(','));
      if (this.filtroDemandados.length) p.set('demandados', this.filtroDemandados.join(','));
      if (this.filtroTerceros.length)   p.set('terceros',   this.filtroTerceros.join(','));
      if (this.filtroConDemanda)        p.set('con_demanda','1');
      if (this.filtroFechaDesde)        p.set('fecha_desde',this.filtroFechaDesde);
      if (this.filtroFechaHasta)        p.set('fecha_hasta',this.filtroFechaHasta);
      if (this.token)                   p.set('token', this.token);
      window.location.href = '/api/exportar?' + p.toString();
    },

    exportarAbogados() {
      const p = new URLSearchParams();
      if (this.filtroAb)         p.set('filtro_ab', this.filtroAb);
      if (this.filtroRepresenta) p.set('filtro_representa', this.filtroRepresenta);
      if (this.token)            p.set('token', this.token);
      window.location.href = '/api/exportar?' + p.toString();
    },
  };
}
</script>
</body>
</html>
