<!-- ─── JAVASCRIPT ──────────────────────────────────────────────────────── -->
<script>
function app() {
  return {
    pageState: 'loading',
    currentUser: null, token: null,
    loginUser: '', loginPass: '', loginError: '', loginLoading: false,

    vista: 'expedientes', cargando: true, cargandoAb: false, panelDer: null,
    stats: { total:0, si:0, no:0, error:0, pct_si:0, pct_no:0, juzgados:[], secretarias:[] },
    expedientesPagina: [], totalExp: 0, paginaActual: 1, porPagina: 50,

    filtroRes: 'todos', filtroTxt: '', filtroJuzgado: '', filtroSecretaria: '',
    filtroConDemanda: false, filtroFechaDesde: '', filtroFechaHasta: '',
    filtroSinMonto: false, filtroMontoMin: '', filtroMontoMax: '',
    filtroAsignado: '', filtroAsignadoA: '',
    participantes: { actor:[], demandado:[], tercero:[] },
    filtroActores: [], filtroDemandados: [], filtroTerceros: [],
    dropdownAbierto: null, buscarPart: { actor:'', demandado:'', tercero:'' },

    abogados: [], filtroAb: '', filtroRepresenta: '', ordenAb: 'total',

    seleccionados: [], todosDelFiltro: false, asignarA: '', asignandoMasivo: false, usuariosLista: [],

    expedienteDetalle: null, detalleCategoria: '', detalleMateria: '', detalleMonto: '', guardandoDetalle: false, detalleGuardado: false,
    tiposMovimiento: [], movimientos: [], movTipoId: '', movObservacion: '',

    usuarios: [], cargandoUsuarios: false, errorUsuario: '',
    nuevoUser: { username:'', password:'', role:'normal' },

    h() { const h={'Content-Type':'application/json'}; if(this.token) h['Authorization']='Bearer '+this.token; return h; },

    async apiFetch(url, opts={}) {
      if(!opts.headers) opts.headers={};
      if(this.token) opts.headers['Authorization']='Bearer '+this.token;
      const r = await fetch(url, opts);
      if(r.status===401){ this.logout(); return null; }
      return r;
    },

    async init() {
      this.token = localStorage.getItem('pjn_token');
      if(this.token){
        try {
          const r = await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+this.token}});
          if(r.ok){ this.currentUser=await r.json(); this.pageState='app'; await this.cargar(); return; }
        } catch(e){}
      }
      this.token=null; localStorage.removeItem('pjn_token'); this.pageState='login';
    },

    async hacerLogin() {
      this.loginError='';
      if(!this.loginUser||!this.loginPass){ this.loginError='Completá usuario y contraseña'; return; }
      this.loginLoading=true;
      try {
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:this.loginUser,password:this.loginPass})});
        if(!r.ok){ this.loginError=(await r.json()).detail||'Error al ingresar'; return; }
        const d=await r.json();
        this.token=d.access_token; this.currentUser={user_id:d.user_id,username:d.username,role:d.role};
        localStorage.setItem('pjn_token',this.token); this.pageState='app';
        await this.cargar();
        if(this.currentUser.role==='admin') await this.cargarUsuariosLista();
      } catch(e){ this.loginError='Error de conexión'; }
      finally { this.loginLoading=false; }
    },

    logout() {
      this.token=null; this.currentUser=null; localStorage.removeItem('pjn_token');
      this.pageState='login'; this.loginUser=''; this.loginPass='';
    },

    async cargar() {
      this.cargando=true; this.panelDer=null;
      try {
        const r=await this.apiFetch('/api/stats'); if(r) this.stats=await r.json();
        await this.cargarExpedientes();
        const rp=await this.apiFetch('/api/participantes'); if(rp) this.participantes=await rp.json();
        if(this.currentUser?.role==='admin') await this.cargarUsuariosLista();
      } catch(e){ console.error(e); }
      this.cargando=false;
    },

    async cargarExpedientes() {
      const p=new URLSearchParams({pagina:this.paginaActual,por_pagina:this.porPagina});
      if(this.filtroRes!=='todos') p.set('resultado',this.filtroRes);
      if(this.filtroJuzgado)      p.set('juzgado',this.filtroJuzgado);
      if(this.filtroSecretaria)   p.set('secretaria',this.filtroSecretaria);
      if(this.filtroTxt)          p.set('busqueda',this.filtroTxt);
      if(this.filtroActores.length)    p.set('actores',this.filtroActores.join(','));
      if(this.filtroDemandados.length) p.set('demandados',this.filtroDemandados.join(','));
      if(this.filtroTerceros.length)   p.set('terceros',this.filtroTerceros.join(','));
      if(this.filtroConDemanda)   p.set('con_demanda','1');
      if(this.filtroFechaDesde)   p.set('fecha_desde',this.filtroFechaDesde);
      if(this.filtroFechaHasta)   p.set('fecha_hasta',this.filtroFechaHasta);
      if(this.filtroSinMonto)     p.set('sin_monto','1');
      if(this.filtroMontoMin)     p.set('monto_min',this.filtroMontoMin);
      if(this.filtroMontoMax)     p.set('monto_max',this.filtroMontoMax);
      if(this.filtroAsignado)     p.set('asignado',this.filtroAsignado);
      if(this.filtroAsignadoA)    p.set('asignado_a',this.filtroAsignadoA);
      const r=await this.apiFetch('/api/expedientes?'+p); if(!r) return;
      const d=await r.json(); this.expedientesPagina=d.items; this.totalExp=d.total;
    },

    async cargarAbogados() {
      this.cargandoAb=true;
      try {
        const p=new URLSearchParams();
        if(this.filtroAb)         p.set('filtro_ab',this.filtroAb);
        if(this.filtroRepresenta) p.set('filtro_representa',this.filtroRepresenta);
        const r=await this.apiFetch('/api/abogados?'+p); if(!r) return;
        let d=await r.json();
        if(this.ordenAb==='nombre') d=[...d].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
        else if(this.ordenAb==='si') d=[...d].sort((a,b)=>b.si-a.si);
        this.abogados=d;
      } catch(e){ console.error(e); }
      this.cargandoAb=false;
    },

    async aplicarFiltros() {
      this.paginaActual=1; this.seleccionados=[]; this.todosDelFiltro=false;
      await this.cargarExpedientes();
    },

    get totalPaginas(){ return Math.max(1,Math.ceil(this.totalExp/this.porPagina)); },
    async paginaAnterior(){ if(this.paginaActual>1){ this.paginaActual--; await this.cargarExpedientes(); } },
    async paginaSiguiente(){ if(this.paginaActual<this.totalPaginas){ this.paginaActual++; await this.cargarExpedientes(); } },

    get juzgadosUnicos(){ return this.stats.juzgados||[]; },
    get secretariasUnicas(){ return this.stats.secretarias||[]; },

    partFiltrada(tipo){ const l=this.participantes[tipo]||[]; const b=(this.buscarPart[tipo]||'').toLowerCase(); return b?l.filter(n=>n.toLowerCase().includes(b)):l; },
    getParte(exp,tipo){ const p=(exp.participantes||[]).find(p=>(p.tipo||'').toLowerCase().includes(tipo)); if(!p||!p.nombre) return '—'; return p.nombre.length>32?p.nombre.substring(0,32)+'…':p.nombre; },

    async verDetalle(id) {
      this.expedienteDetalle=null; this.detalleCategoria=''; this.detalleMateria=''; this.detalleMonto=''; this.detalleGuardado=false;
      this.movimientos=[]; this.movTipoId=''; this.movObservacion='';
      this.vista='detalle'; this.cargando=true;
      try {
        const [r, rt, rm] = await Promise.all([
          this.apiFetch('/api/expedientes/'+id),
          this.apiFetch('/api/tipos-movimiento'),
          this.apiFetch('/api/expedientes/'+id+'/movimientos'),
        ]);
        if(!r||!r.ok){ alert('No se pudo cargar el expediente'); this.vista='expedientes'; return; }
        this.expedienteDetalle=await r.json();
        this.detalleCategoria=this.expedienteDetalle.categoria||'';
        this.detalleMateria=this.expedienteDetalle.materia||'';
        this.detalleMonto=this.expedienteDetalle.monto_demanda!=null?String(this.expedienteDetalle.monto_demanda):'';
        if(rt&&rt.ok) this.tiposMovimiento=await rt.json();
        if(rm&&rm.ok) this.movimientos=await rm.json();
      } catch(e){ console.error(e); }
      this.cargando=false;
    },

    async crearTipoMovimiento() {
      const nombre = prompt('Nombre del nuevo tipo de movimiento:');
      if(!nombre||!nombre.trim()) return;
      const r=await this.apiFetch('/api/tipos-movimiento',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nombre.trim()})});
      if(r&&r.ok){ const t=await r.json(); this.tiposMovimiento=[...this.tiposMovimiento.filter(x=>x.id!==t.id),t].sort((a,b)=>a.nombre.localeCompare(b.nombre)); this.movTipoId=t.id; }
    },

    async agregarMovimiento() {
      if(!this.movTipoId||!this.expedienteDetalle) return;
      const r=await this.apiFetch('/api/expedientes/'+this.expedienteDetalle.id+'/movimientos',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({tipo_id:parseInt(this.movTipoId),observacion:this.movObservacion||null})
      });
      if(r&&r.ok){
        const rm=await this.apiFetch('/api/expedientes/'+this.expedienteDetalle.id+'/movimientos');
        if(rm&&rm.ok) this.movimientos=await rm.json();
        this.movTipoId=''; this.movObservacion='';
      }
    },

    async guardarDetalle() {
      if(!this.expedienteDetalle) return;
      this.guardandoDetalle=true; this.detalleGuardado=false;
      try {
        const r=await this.apiFetch('/api/expedientes/'+this.expedienteDetalle.id,{
          method:'PATCH', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({categoria:this.detalleCategoria||null,materia:this.detalleMateria||null,monto_demanda:this.detalleMonto!==''?parseFloat(this.detalleMonto):null})
        });
        if(r&&r.ok){
          this.detalleGuardado=true;
          this.expedienteDetalle.categoria=this.detalleCategoria||null;
          this.expedienteDetalle.materia=this.detalleMateria||null;
          this.expedienteDetalle.monto_demanda=this.detalleMonto!==''?parseFloat(this.detalleMonto):null;
          setTimeout(()=>{ this.detalleGuardado=false; },3000);
        }
      } catch(e){ console.error(e); }
      this.guardandoDetalle=false;
    },

    async eliminarExpedienteDetalle() {
      if(!this.expedienteDetalle) return;
      const r=await this.apiFetch('/api/expedientes/'+this.expedienteDetalle.id,{method:'DELETE'});
      if(r&&r.ok){ this.expedienteDetalle=null; this.vista='expedientes'; const rs=await this.apiFetch('/api/stats'); if(rs) this.stats=await rs.json(); await this.cargarExpedientes(); }
    },

    toggleSeleccionarPagina(e) {
      if(e.target.checked){ const ids=this.expedientesPagina.map(x=>x.id); this.seleccionados=[...new Set([...this.seleccionados,...ids])]; }
      else { const ids=new Set(this.expedientesPagina.map(x=>x.id)); this.seleccionados=this.seleccionados.filter(id=>!ids.has(id)); this.todosDelFiltro=false; }
    },

    async ejecutarAsignacion() {
      if(!this.asignarA) return; this.asignandoMasivo=true;
      try {
        let r;
        if(this.todosDelFiltro){
          const body={user_id:parseInt(this.asignarA),resultado:this.filtroRes==='todos'?'':this.filtroRes,juzgado:this.filtroJuzgado,secretaria:this.filtroSecretaria,busqueda:this.filtroTxt,actores:this.filtroActores.join(','),demandados:this.filtroDemandados.join(','),terceros:this.filtroTerceros.join(','),con_demanda:this.filtroConDemanda,fecha_desde:this.filtroFechaDesde,fecha_hasta:this.filtroFechaHasta};
          r=await this.apiFetch('/api/asignar-filtro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        } else {
          r=await this.apiFetch('/api/asignar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:parseInt(this.asignarA),expediente_ids:this.seleccionados})});
        }
        if(r&&r.ok){ const d=await r.json(); alert('Se asignaron '+d.asignados+' expediente/s.'); this.seleccionados=[]; this.todosDelFiltro=false; this.asignarA=''; await this.cargarUsuarios(); }
      } catch(e){ console.error(e); }
      this.asignandoMasivo=false;
    },

    async cargarUsuariosLista() {
      try { const r=await this.apiFetch('/api/users'); if(r&&r.ok){ const d=await r.json(); this.usuariosLista=d.map(u=>({id:u.id,username:u.username,role:u.role})); } } catch(e){}
    },

    async cargarUsuarios() {
      this.cargandoUsuarios=true;
      try { const r=await this.apiFetch('/api/users'); if(r&&r.ok){ this.usuarios=await r.json(); this.usuariosLista=this.usuarios.map(u=>({id:u.id,username:u.username,role:u.role})); } } catch(e){}
      this.cargandoUsuarios=false;
    },

    async crearUsuario() {
      this.errorUsuario='';
      if(!this.nuevoUser.username.trim()){ this.errorUsuario='El nombre es obligatorio'; return; }
      if(!this.nuevoUser.password){ this.errorUsuario='La contraseña es obligatoria'; return; }
      this.cargandoUsuarios=true;
      try {
        const r=await this.apiFetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.nuevoUser)});
        if(!r) return;
        if(!r.ok){ this.errorUsuario=(await r.json()).detail||'Error'; }
        else { this.nuevoUser={username:'',password:'',role:'normal'}; await this.cargarUsuarios(); }
      } catch(e){ this.errorUsuario='Error de conexión'; }
      this.cargandoUsuarios=false;
    },

    async eliminarUsuario(id) {
      try { const r=await this.apiFetch('/api/users/'+id,{method:'DELETE'}); if(r&&r.ok) await this.cargarUsuarios(); } catch(e){}
    },

    async eliminarExpediente(id) {
      if(!confirm('¿Eliminar este expediente permanentemente?')) return;
      const r=await this.apiFetch('/api/expedientes/'+id,{method:'DELETE'});
      if(r&&r.ok){ const rs=await this.apiFetch('/api/stats'); if(rs) this.stats=await rs.json(); await this.cargarExpedientes(); }
    },

    exportarExpedientes() {
      const p=new URLSearchParams();
      if(this.filtroRes!=='todos') p.set('resultado',this.filtroRes);
      if(this.filtroJuzgado)   p.set('juzgado',this.filtroJuzgado);
      if(this.filtroSecretaria) p.set('secretaria',this.filtroSecretaria);
      if(this.filtroTxt)       p.set('busqueda',this.filtroTxt);
      if(this.filtroActores.length)    p.set('actores',this.filtroActores.join(','));
      if(this.filtroDemandados.length) p.set('demandados',this.filtroDemandados.join(','));
      if(this.filtroTerceros.length)   p.set('terceros',this.filtroTerceros.join(','));
      if(this.filtroConDemanda) p.set('con_demanda','1');
      if(this.filtroFechaDesde) p.set('fecha_desde',this.filtroFechaDesde);
      if(this.filtroFechaHasta) p.set('fecha_hasta',this.filtroFechaHasta);
      if(this.filtroSinMonto)   p.set('sin_monto','1');
      if(this.filtroMontoMin)   p.set('monto_min',this.filtroMontoMin);
      if(this.filtroMontoMax)   p.set('monto_max',this.filtroMontoMax);
      if(this.filtroAsignado)   p.set('asignado',this.filtroAsignado);
      if(this.filtroAsignadoA)  p.set('asignado_a',this.filtroAsignadoA);
      if(this.token)            p.set('token',this.token);
      window.location.href='/api/exportar?'+p;
    },

    exportarAbogados() {
      const p=new URLSearchParams();
      if(this.filtroAb)         p.set('filtro_ab',this.filtroAb);
      if(this.filtroRepresenta) p.set('filtro_representa',this.filtroRepresenta);
      if(this.token)            p.set('token',this.token);
      window.location.href='/api/exportar?'+p;
    },
  };
}
</script>
