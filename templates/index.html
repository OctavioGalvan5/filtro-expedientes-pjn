<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caja de Abogados — Salta · PJN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          colors: { gold: { DEFAULT:'#c9a53e', light:'#e8c76a', dark:'#9e7d25' } }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    html,body{height:100%;background:#080e1c;color:#dde3ee;font-family:'Inter',sans-serif}

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#0d1527}
    ::-webkit-scrollbar-thumb{background:#1e3058;border-radius:9999px}
    ::-webkit-scrollbar-thumb:hover{background:#2a4070}

    /* Badges resultado */
    .badge-si   {background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
    .badge-no   {background:rgba(239,68,68,.12); color:#f87171;border:1px solid rgba(239,68,68,.25)}
    .badge-err  {background:rgba(234,179,8,.12); color:#facc15;border:1px solid rgba(234,179,8,.25)}

    /* Tipo de parte */
    .pill-actor    {background:rgba(59,130,246,.18);color:#93c5fd}
    .pill-demandado{background:rgba(239,68,68,.18); color:#fca5a5}
    .pill-tercero  {background:rgba(168,85,247,.18);color:#d8b4fe}
    .pill-otro     {background:rgba(148,163,184,.12);color:#94a3b8}

    /* Tabla */
    .tbl-row{border-bottom:1px solid rgba(255,255,255,.045);transition:background .12s}
    .tbl-row:hover{background:rgba(255,255,255,.04)}
    .tbl-row.active{background:rgba(201,165,62,.08);border-left:3px solid #c9a53e}
    .tbl-head th{background:#0d1527;position:sticky;top:0;z-index:10;
                 font-size:.68rem;font-weight:600;letter-spacing:.07em;
                 text-transform:uppercase;color:#64748b;padding:.6rem 1rem;
                 border-bottom:1px solid rgba(255,255,255,.07)}

    /* Stat card */
    .stat-card{background:#0d1527;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:1rem 1.25rem}
    .stat-card .num{font-size:1.65rem;font-weight:700;line-height:1}
    .stat-card .lbl{font-size:.72rem;color:#64748b;margin-top:.25rem}

    /* Sidebar nav */
    .nav-btn{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;border-radius:8px;
             font-size:.83rem;font-weight:500;color:#64748b;cursor:pointer;transition:all .15s;
             border:none;background:transparent;width:100%}
    .nav-btn:hover{background:rgba(255,255,255,.05);color:#c9a53e}
    .nav-btn.active{background:rgba(201,165,62,.12);color:#c9a53e;border:1px solid rgba(201,165,62,.2)}

    /* Panel derecho */
    .detail-panel{border-left:1px solid rgba(255,255,255,.07);background:#090f1e}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{animation:spin 1s linear infinite}

    /* Input */
    .inp{background:#0d1527;border:1px solid rgba(255,255,255,.1);border-radius:8px;
         padding:.45rem .85rem;font-size:.83rem;color:#dde3ee;outline:none;transition:border-color .15s}
    .inp::placeholder{color:#334155}
    .inp:focus{border-color:#c9a53e}
    select.inp{cursor:pointer}
  </style>
</head>

<body class="flex h-full overflow-hidden" x-data="app()" x-init="init()" x-cloak>

<!-- ═══════════════════════ SIDEBAR ═══════════════════════════════════════ -->
<aside class="flex flex-col w-56 flex-shrink-0 border-r border-white/5" style="background:#060c18">

  <!-- Logo -->
  <div class="px-5 py-5 border-b border-white/5">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
           style="background:linear-gradient(135deg,#c9a53e,#9e7d25)">
        <span class="text-black font-bold text-sm">⚖</span>
      </div>
      <div>
        <div class="font-bold text-white text-sm leading-tight">Caja de Abogados</div>
        <div class="text-xs" style="color:#c9a53e">Salta · PJN Scraper</div>
      </div>
    </div>
  </div>

  <!-- Navegación -->
  <nav class="flex flex-col gap-1 px-3 py-4 flex-1">
    <p class="text-xs font-semibold text-slate-600 uppercase tracking-wider px-2 mb-1">Vistas</p>
    <button class="nav-btn" :class="vista==='expedientes' && 'active'" @click="vista='expedientes';panelDer=null">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Expedientes
    </button>
    <button class="nav-btn" :class="vista==='abogados' && 'active'" @click="vista='abogados';panelDer=null">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Por Abogado
    </button>
  </nav>

  <!-- Footer sidebar -->
  <div class="px-3 py-3 border-t border-white/5">
    <button @click="cargar()"
      class="nav-btn w-full"
      :disabled="cargando">
      <svg class="w-4 h-4 flex-shrink-0" :class="cargando && 'spinner'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      <span x-text="cargando ? 'Cargando...' : 'Actualizar datos'"></span>
    </button>
  </div>
</aside>

<!-- ═══════════════════════ CONTENIDO PRINCIPAL ═══════════════════════════ -->
<div class="flex flex-col flex-1 overflow-hidden">

  <!-- ── HEADER ──────────────────────────────────────────────────────────── -->
  <header class="flex items-center justify-between px-6 py-3.5 border-b border-white/5 flex-shrink-0"
          style="background:#060c18">
    <div>
      <h1 class="font-semibold text-white text-base" x-text="vista==='expedientes' ? 'Expedientes analizados' : 'Directorio de Abogados'"></h1>
      <p class="text-slate-500 text-xs mt-0.5"
         x-text="vista==='expedientes'
           ? expedientesFiltrados.length + ' expedientes · ' + (stats.total||0) + ' total'
           : abogadosFiltrados.length + ' abogados encontrados'">
      </p>
    </div>
    <!-- Stats resumen en header -->
    <div class="flex items-center gap-5 text-sm">
      <div class="text-center">
        <div class="font-bold text-white" x-text="stats.si ?? '—'"></div>
        <div class="text-xs text-green-600">Presenta</div>
      </div>
      <div class="w-px h-6 bg-white/10"></div>
      <div class="text-center">
        <div class="font-bold text-white" x-text="stats.no ?? '—'"></div>
        <div class="text-xs text-red-600">No presenta</div>
      </div>
      <div class="w-px h-6 bg-white/10"></div>
      <div class="text-center">
        <div class="font-bold text-white" x-text="stats.total ?? '—'"></div>
        <div class="text-xs text-slate-500">Total</div>
      </div>
    </div>
  </header>

  <!-- ── STATS CARDS ──────────────────────────────────────────────────────── -->
  <div class="grid grid-cols-4 gap-3 px-5 py-3 border-b border-white/5 flex-shrink-0"
       style="background:#060c18">
    <div class="stat-card">
      <div class="num text-white" x-text="stats.total ?? '—'"></div>
      <div class="lbl">Total expedientes</div>
    </div>
    <div class="stat-card" style="border-color:rgba(34,197,94,.2)">
      <div class="num text-green-400" x-text="stats.si ?? '—'"></div>
      <div class="lbl">Caja se presenta · <span class="text-green-700" x-text="(stats.pct_si||0)+'%'"></span></div>
    </div>
    <div class="stat-card" style="border-color:rgba(239,68,68,.2)">
      <div class="num text-red-400" x-text="stats.no ?? '—'"></div>
      <div class="lbl">No se presenta · <span class="text-red-700" x-text="(stats.pct_no||0)+'%'"></span></div>
    </div>
    <div class="stat-card" x-show="vista==='expedientes'" style="border-color:rgba(234,179,8,.2)">
      <div class="num text-yellow-400" x-text="stats.error ?? '—'"></div>
      <div class="lbl">Error / Pendiente</div>
    </div>
    <div class="stat-card" x-show="vista==='abogados'" style="border-color:rgba(201,165,62,.2)">
      <div class="num" style="color:#c9a53e" x-text="abogadosStats.length"></div>
      <div class="lbl">Abogados únicos</div>
    </div>
  </div>

  <!-- ── BODY: tabla + panel ─────────────────────────────────────────────── -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Spinner global -->
    <div x-show="cargando" class="flex items-center justify-center w-full">
      <div class="flex flex-col items-center gap-3 text-slate-500">
        <svg class="w-8 h-8 spinner" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-opacity=".2"/>
          <path fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4l-3 3-3-3h4z"/>
        </svg>
        <span class="text-sm">Cargando datos...</span>
      </div>
    </div>

    <!-- ════════ VISTA: EXPEDIENTES ════════════════════════════════════════ -->
    <template x-if="!cargando && vista==='expedientes'">
      <div class="flex flex-1 overflow-hidden">

        <!-- Tabla expedientes -->
        <div class="flex flex-col overflow-hidden transition-all duration-300"
             :style="panelDer ? 'width:52%' : 'width:100%'">

          <!-- Filtros -->
          <div class="flex items-center gap-2.5 px-4 py-2.5 border-b border-white/5 flex-shrink-0" style="background:#080e1c">
            <select x-model="filtroRes" class="inp">
              <option value="todos">Todos los resultados</option>
              <option value="Si">✓  Se presenta</option>
              <option value="No">✗  No se presenta</option>
              <option value="error">⚠  Error / Pendiente</option>
            </select>
            <div class="relative flex-1">
              <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-600"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input x-model="filtroTxt" type="text" class="inp w-full pl-8"
                     placeholder="Buscar número, carátula, parte, abogado…"/>
            </div>
          </div>

          <!-- Tabla -->
          <div class="overflow-y-auto flex-1">
            <table class="w-full text-sm">
              <thead class="tbl-head">
                <tr>
                  <th class="text-left">Número / Año</th>
                  <th class="text-left">Actor</th>
                  <th class="text-left">Demandado</th>
                  <th class="text-center">Resultado</th>
                  <th class="text-center">Abogados</th>
                  <th class="text-left">Analizado</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="exp in expedientesFiltrados" :key="exp.id">
                  <tr class="tbl-row cursor-pointer"
                      :class="panelDer?.id === exp.id && 'active'"
                      @click="panelDer = panelDer?.id===exp.id ? null : exp">
                    <td class="px-4 py-2.5 whitespace-nowrap">
                      <div class="font-mono text-slate-300 text-xs" x-text="exp.numero + ' / ' + exp.anio"></div>
                      <div class="text-slate-600 text-xs mt-0.5 truncate max-w-[140px]"
                           x-text="(exp.caratula||'').substring(0,40)"></div>
                    </td>
                    <td class="px-4 py-2.5 text-slate-300 text-xs">
                      <span x-text="getParte(exp,'actor')" class="truncate block max-w-[160px]"></span>
                    </td>
                    <td class="px-4 py-2.5 text-slate-300 text-xs">
                      <span x-text="getParte(exp,'demandado')" class="truncate block max-w-[160px]"></span>
                    </td>
                    <td class="px-4 py-2.5 text-center">
                      <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                            :class="{'badge-si':exp.caja_se_presenta==='Si','badge-no':exp.caja_se_presenta==='No','badge-err':!['Si','No'].includes(exp.caja_se_presenta)}"
                            x-text="exp.caja_se_presenta||'—'"></span>
                    </td>
                    <td class="px-4 py-2.5 text-center text-slate-400"
                        x-text="(exp.participantes||[]).reduce((s,p)=>s+(p.abogados||[]).length,0)"></td>
                    <td class="px-4 py-2.5 text-slate-500 text-xs font-mono"
                        x-text="(exp.fecha_analisis||'').substring(0,10)"></td>
                  </tr>
                </template>
                <tr x-show="expedientesFiltrados.length===0">
                  <td colspan="6" class="px-4 py-12 text-center text-slate-600 text-sm">
                    Ningún expediente coincide con el filtro.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Panel derecho: detalle expediente -->
        <div x-show="panelDer" class="detail-panel flex flex-col overflow-hidden"
             style="width:48%"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 translate-x-4"
             x-transition:enter-end="opacity-100 translate-x-0">

          <!-- Header panel -->
          <div class="px-5 py-4 border-b border-white/5 flex-shrink-0">
            <div class="flex items-start justify-between">
              <div class="flex-1 min-w-0">
                <div class="font-mono font-semibold text-white"
                     x-text="panelDer?.numero + ' / ' + panelDer?.anio"></div>
                <div class="text-slate-400 text-xs mt-1 leading-snug"
                     x-text="panelDer?.caratula"></div>
                <div class="flex items-center gap-2 mt-2">
                  <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold"
                        :class="{'badge-si':panelDer?.caja_se_presenta==='Si','badge-no':panelDer?.caja_se_presenta==='No','badge-err':!['Si','No'].includes(panelDer?.caja_se_presenta)}"
                        x-text="'Caja: ' + (panelDer?.caja_se_presenta||'—')"></span>
                  <span class="text-xs text-slate-600 font-mono"
                        x-text="(panelDer?.fecha_analisis||'').substring(0,10)"></span>
                </div>
              </div>
              <button @click="panelDer=null" class="text-slate-600 hover:text-white transition-colors ml-3 mt-0.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Participantes -->
          <div class="flex-1 overflow-y-auto px-5 py-4 space-y-3">
            <p class="text-xs font-semibold text-slate-600 uppercase tracking-wider">
              Intervinientes (<span x-text="(panelDer?.participantes||[]).length"></span>)
            </p>

            <template x-if="!(panelDer?.participantes||[]).length">
              <div class="text-center text-slate-600 text-sm py-8">Sin intervinientes registrados</div>
            </template>

            <template x-for="parte in (panelDer?.participantes||[])" :key="parte.id">
              <div class="rounded-xl overflow-hidden border border-white/5" style="background:#0d1527">
                <div class="px-4 py-3 flex items-center gap-2.5">
                  <span class="px-1.5 py-0.5 rounded text-xs font-bold uppercase"
                        :class="{'pill-actor':(parte.tipo||'').toLowerCase().includes('actor'),'pill-demandado':(parte.tipo||'').toLowerCase().includes('demandado'),'pill-tercero':(parte.tipo||'').toLowerCase().includes('tercero'),'pill-otro':!['actor','demandado','tercero'].some(t=>(parte.tipo||'').toLowerCase().includes(t))}"
                        x-text="parte.tipo||'PARTE'"></span>
                  <span class="text-white text-sm font-medium" x-text="parte.nombre"></span>
                </div>
                <!-- Abogados de esta parte -->
                <div class="border-t border-white/5">
                  <template x-if="!(parte.abogados||[]).length">
                    <div class="px-4 py-2 text-xs text-slate-700 italic">Sin abogados registrados</div>
                  </template>
                  <template x-for="ab in (parte.abogados||[])" :key="ab.id">
                    <div class="flex items-start gap-3 px-4 py-2.5 border-t border-white/[.04] hover:bg-white/[.025] transition-colors">
                      <svg class="w-3.5 h-3.5 text-slate-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                      </svg>
                      <div>
                        <div class="text-slate-200 text-xs font-medium" x-text="ab.nombre"></div>
                        <div class="flex flex-wrap gap-x-3 mt-0.5">
                          <span x-show="ab.tomo_folio" class="text-xs text-slate-600 font-mono" x-text="'T/F: '+ab.tomo_folio"></span>
                          <span x-show="ab.cuit" class="text-xs text-slate-600 font-mono" x-text="'CUIT: '+ab.cuit"></span>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>

      </div>
    </template>

    <!-- ════════ VISTA: ABOGADOS ════════════════════════════════════════════ -->
    <template x-if="!cargando && vista==='abogados'">
      <div class="flex flex-1 overflow-hidden">

        <!-- Tabla abogados -->
        <div class="flex flex-col overflow-hidden transition-all duration-300"
             :style="panelDer ? 'width:48%' : 'width:100%'">

          <!-- Filtro -->
          <div class="flex items-center gap-2.5 px-4 py-2.5 border-b border-white/5 flex-shrink-0" style="background:#080e1c">
            <div class="relative flex-1">
              <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-600"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input x-model="filtroAb" type="text" class="inp w-full pl-8"
                     placeholder="Buscar abogado por nombre o CUIT…"/>
            </div>
            <select x-model="ordenAb" class="inp">
              <option value="total">Ordenar: más expedientes</option>
              <option value="nombre">Ordenar: nombre A-Z</option>
              <option value="si">Ordenar: más Se Presenta</option>
            </select>
          </div>

          <!-- Tabla abogados -->
          <div class="overflow-y-auto flex-1">
            <table class="w-full text-sm">
              <thead class="tbl-head">
                <tr>
                  <th class="text-left">Abogado</th>
                  <th class="text-left">CUIT</th>
                  <th class="text-center">Total</th>
                  <th class="text-center">Se presenta</th>
                  <th class="text-center">No presenta</th>
                  <th class="text-center">Error</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="ab in abogadosFiltrados" :key="ab.nombre">
                  <tr class="tbl-row cursor-pointer"
                      :class="panelDer?.nombre===ab.nombre && 'active'"
                      @click="panelDer = panelDer?.nombre===ab.nombre ? null : ab">
                    <td class="px-4 py-2.5">
                      <div class="font-medium text-slate-200 text-sm" x-text="ab.nombre"></div>
                      <div x-show="ab.tomo_folio" class="text-xs text-slate-600 font-mono mt-0.5" x-text="'T/F: '+ab.tomo_folio"></div>
                    </td>
                    <td class="px-4 py-2.5 text-xs text-slate-500 font-mono" x-text="ab.cuit||'—'"></td>
                    <td class="px-4 py-2.5 text-center">
                      <span class="font-bold text-white" x-text="ab.total"></span>
                    </td>
                    <td class="px-4 py-2.5 text-center">
                      <span x-show="ab.si>0" class="px-2 py-0.5 rounded-full text-xs font-semibold badge-si" x-text="ab.si"></span>
                      <span x-show="ab.si===0" class="text-slate-700">—</span>
                    </td>
                    <td class="px-4 py-2.5 text-center">
                      <span x-show="ab.no>0" class="px-2 py-0.5 rounded-full text-xs font-semibold badge-no" x-text="ab.no"></span>
                      <span x-show="ab.no===0" class="text-slate-700">—</span>
                    </td>
                    <td class="px-4 py-2.5 text-center">
                      <span x-show="ab.error>0" class="px-2 py-0.5 rounded-full text-xs font-semibold badge-err" x-text="ab.error"></span>
                      <span x-show="ab.error===0" class="text-slate-700">—</span>
                    </td>
                  </tr>
                </template>
                <tr x-show="abogadosFiltrados.length===0">
                  <td colspan="6" class="px-4 py-12 text-center text-slate-600 text-sm">
                    No hay abogados registrados aún.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Panel derecho: expedientes del abogado -->
        <div x-show="panelDer" class="detail-panel flex flex-col overflow-hidden"
             style="width:52%"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 translate-x-4"
             x-transition:enter-end="opacity-100 translate-x-0">

          <!-- Header -->
          <div class="px-5 py-4 border-b border-white/5 flex-shrink-0">
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <div class="font-semibold text-white" x-text="panelDer?.nombre"></div>
                <div class="flex items-center gap-3 mt-1 text-xs text-slate-500 font-mono">
                  <span x-show="panelDer?.cuit" x-text="'CUIT: '+panelDer?.cuit"></span>
                  <span x-show="panelDer?.tomo_folio" x-text="'T/F: '+panelDer?.tomo_folio"></span>
                </div>
                <!-- Mini stats del abogado -->
                <div class="flex items-center gap-4 mt-3">
                  <div class="text-center">
                    <div class="font-bold text-white text-lg" x-text="panelDer?.total"></div>
                    <div class="text-xs text-slate-600">Total</div>
                  </div>
                  <div class="text-center">
                    <div class="font-bold text-green-400 text-lg" x-text="panelDer?.si"></div>
                    <div class="text-xs text-green-800">Presenta</div>
                  </div>
                  <div class="text-center">
                    <div class="font-bold text-red-400 text-lg" x-text="panelDer?.no"></div>
                    <div class="text-xs text-red-800">No presenta</div>
                  </div>
                  <template x-if="panelDer?.error>0">
                    <div class="text-center">
                      <div class="font-bold text-yellow-400 text-lg" x-text="panelDer?.error"></div>
                      <div class="text-xs text-yellow-800">Error</div>
                    </div>
                  </template>
                </div>
              </div>
              <button @click="panelDer=null" class="text-slate-600 hover:text-white transition-colors ml-3">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Lista de expedientes del abogado -->
          <div class="flex-1 overflow-y-auto">
            <table class="w-full text-sm">
              <thead class="tbl-head">
                <tr>
                  <th class="text-left">Número / Año</th>
                  <th class="text-left">Carátula</th>
                  <th class="text-left">Representa a</th>
                  <th class="text-center">Resultado</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="item in (panelDer?.expedientes||[])" :key="item.exp.id">
                  <tr class="tbl-row">
                    <td class="px-4 py-2.5 font-mono text-slate-300 text-xs whitespace-nowrap"
                        x-text="item.exp.numero + ' / ' + item.exp.anio"></td>
                    <td class="px-4 py-2.5 text-slate-400 text-xs">
                      <span x-text="(item.exp.caratula||'—').length>42
                        ? (item.exp.caratula||'').substring(0,42)+'…'
                        : (item.exp.caratula||'—')"></span>
                    </td>
                    <td class="px-4 py-2.5">
                      <span class="px-1.5 py-0.5 rounded text-xs font-bold uppercase mr-1.5"
                            :class="{'pill-actor':(item.parte_tipo||'').toLowerCase().includes('actor'),'pill-demandado':(item.parte_tipo||'').toLowerCase().includes('demandado'),'pill-tercero':(item.parte_tipo||'').toLowerCase().includes('tercero'),'pill-otro':!['actor','demandado','tercero'].some(t=>(item.parte_tipo||'').toLowerCase().includes(t))}"
                            x-text="item.parte_tipo||'PARTE'"></span>
                      <span class="text-xs text-slate-400" x-text="item.parte_nombre"></span>
                    </td>
                    <td class="px-4 py-2.5 text-center">
                      <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                            :class="{'badge-si':item.exp.caja_se_presenta==='Si','badge-no':item.exp.caja_se_presenta==='No','badge-err':!['Si','No'].includes(item.exp.caja_se_presenta)}"
                            x-text="item.exp.caja_se_presenta||'—'"></span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </template>

  </div><!-- fin body -->
</div><!-- fin contenido principal -->

<!-- ═══════════════════════ JAVASCRIPT ════════════════════════════════════ -->
<script>
function app() {
  return {
    vista: 'expedientes',
    expedientes: [],
    stats: { total:0, si:0, no:0, error:0, pct_si:0, pct_no:0 },
    cargando: true,
    panelDer: null,

    // Expedientes
    filtroRes: 'todos',
    filtroTxt: '',

    // Abogados
    filtroAb: '',
    ordenAb: 'total',

    /* ── Init ── */
    async init() { await this.cargar(); },

    async cargar() {
      this.cargando = true;
      this.panelDer = null;
      try {
        const [s, e] = await Promise.all([
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/expedientes').then(r => r.json()),
        ]);
        this.stats = s;
        this.expedientes = e;
      } catch (err) { console.error(err); }
      this.cargando = false;
    },

    /* ── Expedientes filtrados ── */
    get expedientesFiltrados() {
      let r = this.expedientes;
      if (this.filtroRes === 'Si' || this.filtroRes === 'No')
        r = r.filter(e => e.caja_se_presenta === this.filtroRes);
      else if (this.filtroRes === 'error')
        r = r.filter(e => !['Si','No'].includes(e.caja_se_presenta));
      if (this.filtroTxt) {
        const q = this.filtroTxt.toLowerCase();
        r = r.filter(e => {
          let h = `${e.numero} ${e.anio} ${e.caratula||''}`.toLowerCase();
          for (const p of (e.participantes||[])) {
            h += ' ' + (p.nombre||'').toLowerCase();
            for (const ab of (p.abogados||[])) h += ' ' + (ab.nombre||'').toLowerCase();
          }
          return h.includes(q);
        });
      }
      return r;
    },

    /* ── Estadísticas por abogado (calculado client-side) ── */
    get abogadosStats() {
      const mapa = {};
      for (const exp of this.expedientes) {
        const res = exp.caja_se_presenta;
        for (const parte of (exp.participantes||[])) {
          for (const ab of (parte.abogados||[])) {
            const key = ab.nombre || 'Sin nombre';
            if (!mapa[key]) {
              mapa[key] = {
                nombre: key,
                cuit: ab.cuit || '',
                tomo_folio: ab.tomo_folio || '',
                total: 0, si: 0, no: 0, error: 0,
                expedientes: [],
              };
            }
            const entry = mapa[key];
            /* evitar contar el mismo expediente dos veces si el abogado
               aparece en múltiples partes del mismo expediente */
            const yaContado = entry.expedientes.some(i => i.exp.id === exp.id && i.parte_nombre === parte.nombre);
            if (!yaContado) {
              entry.total++;
              if (res === 'Si')      entry.si++;
              else if (res === 'No') entry.no++;
              else                   entry.error++;
              entry.expedientes.push({
                exp,
                parte_tipo:   parte.tipo   || '',
                parte_nombre: parte.nombre || '',
              });
            }
          }
        }
      }
      return Object.values(mapa);
    },

    /* ── Abogados filtrados y ordenados ── */
    get abogadosFiltrados() {
      let r = this.abogadosStats;
      if (this.filtroAb) {
        const q = this.filtroAb.toLowerCase();
        r = r.filter(a => (a.nombre+' '+a.cuit).toLowerCase().includes(q));
      }
      if (this.ordenAb === 'total')  r = [...r].sort((a,b) => b.total - a.total);
      if (this.ordenAb === 'nombre') r = [...r].sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
      if (this.ordenAb === 'si')     r = [...r].sort((a,b) => b.si - a.si);
      return r;
    },

    /* Devuelve el nombre de la primera parte que coincide con el tipo buscado */
    getParte(exp, tipo) {
      const p = (exp.participantes||[]).find(p => (p.tipo||'').toLowerCase().includes(tipo));
      if (!p || !p.nombre) return '—';
      return p.nombre.length > 32 ? p.nombre.substring(0, 32) + '…' : p.nombre;
    },
  };
}
</script>
</body>
</html>
