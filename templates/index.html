<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caja de Abogados — Salta · PJN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          colors: { gold: { DEFAULT:'#c9a53e', light:'#e8c76a', dark:'#9e7d25' } }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    html,body{height:100%;background:#f1f5f9;color:#1e293b;font-family:'Inter',sans-serif}

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#e2e8f0}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:9999px}
    ::-webkit-scrollbar-thumb:hover{background:#94a3b8}

    /* Badges resultado */
    .badge-si   {background:rgba(34,197,94,.15);color:#15803d;border:1px solid rgba(34,197,94,.3)}
    .badge-no   {background:rgba(239,68,68,.12); color:#dc2626;border:1px solid rgba(239,68,68,.25)}
    .badge-err  {background:rgba(234,179,8,.15); color:#b45309;border:1px solid rgba(234,179,8,.3)}

    /* Tipo de parte */
    .pill-actor    {background:rgba(59,130,246,.15);color:#1d4ed8}
    .pill-demandado{background:rgba(239,68,68,.12); color:#dc2626}
    .pill-tercero  {background:rgba(168,85,247,.12);color:#7e22ce}
    .pill-otro     {background:rgba(148,163,184,.15);color:#475569}

    /* Tabla */
    .tbl-row{border-bottom:1px solid rgba(0,0,0,.06);transition:background .12s}
    .tbl-row:hover{background:rgba(0,0,0,.03)}
    .tbl-row.active{background:rgba(201,165,62,.08);border-left:3px solid #c9a53e}
    .tbl-head th{background:#f8fafc;position:sticky;top:0;z-index:10;
                 font-size:.68rem;font-weight:600;letter-spacing:.07em;
                 text-transform:uppercase;color:#94a3b8;padding:.6rem 1rem;
                 border-bottom:1px solid rgba(0,0,0,.07)}

    /* Stat card */
    .stat-card{background:#ffffff;border:1px solid rgba(0,0,0,.07);border-radius:12px;padding:1rem 1.25rem;
               box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .stat-card .num{font-size:1.65rem;font-weight:700;line-height:1}
    .stat-card .lbl{font-size:.72rem;color:#94a3b8;margin-top:.25rem}

    /* Sidebar nav */
    .nav-btn{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;border-radius:8px;
             font-size:.83rem;font-weight:500;color:#64748b;cursor:pointer;transition:all .15s;
             border:none;background:transparent;width:100%}
    .nav-btn:hover{background:rgba(0,0,0,.04);color:#c9a53e}
    .nav-btn.active{background:rgba(201,165,62,.1);color:#9e7d25;border:1px solid rgba(201,165,62,.25)}

    /* Panel derecho */
    .detail-panel{border-left:1px solid rgba(0,0,0,.08);background:#ffffff}

    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{animation:spin 1s linear infinite}

    /* Input */
    .inp{background:#ffffff;border:1px solid #e2e8f0;border-radius:8px;
         padding:.45rem .85rem;font-size:.83rem;color:#1e293b;outline:none;transition:border-color .15s}
    .inp::placeholder{color:#94a3b8}
    .inp:focus{border-color:#c9a53e}
    select.inp{cursor:pointer}
  </style>
</head>

<body class="flex h-full overflow-hidden" x-data="app()" x-init="init()" x-cloak>

<!-- ═══════════════════════ SIDEBAR ═══════════════════════════════════════ -->
<aside class="flex flex-col w-56 flex-shrink-0 border-r border-slate-200" style="background:#ffffff">

  <!-- Logo -->
  <div class="px-5 py-5 border-b border-slate-100">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
           style="background:linear-gradient(135deg,#c9a53e,#9e7d25)">
        <span class="text-black font-bold text-sm">⚖</span>
      </div>
      <div>
        <div class="font-bold text-slate-800 text-sm leading-tight">Caja de Abogados</div>
        <div class="text-xs font-medium" style="color:#c9a53e">Salta · PJN Scraper</div>
      </div>
    </div>
  </div>

  <!-- Navegación -->
  <nav class="flex flex-col gap-1 px-3 py-4 flex-1">
    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-2 mb-1">Vistas</p>
    <button class="nav-btn" :class="vista==='expedientes' && 'active'" @click="vista='expedientes';panelDer=null">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Expedientes
    </button>
    <button class="nav-btn" :class="vista==='abogados' && 'active'" @click="vista='abogados';panelDer=null;if(!abogados.length)cargarAbogados()">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Por Abogado
    </button>
  </nav>

  <!-- Footer sidebar -->
  <div class="px-3 py-3 border-t border-slate-100">
    <button @click="cargar()"
      class="nav-btn w-full"
      :disabled="cargando">
      <svg class="w-4 h-4 flex-shrink-0" :class="cargando && 'spinner'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      <span x-text="cargando ? 'Cargando...' : 'Actualizar datos'"></span>
    </button>
  </div>
</aside>

<!-- ═══════════════════════ CONTENIDO PRINCIPAL ═══════════════════════════ -->
<div class="flex flex-col flex-1 overflow-hidden">

  <!-- ── HEADER ──────────────────────────────────────────────────────────── -->
  <header class="flex items-center justify-between px-6 py-3.5 border-b border-slate-200 flex-shrink-0"
          style="background:#ffffff">
    <div>
      <h1 class="font-semibold text-slate-800 text-base" x-text="vista==='expedientes' ? 'Expedientes analizados' : 'Por Abogado'"></h1>
      <p class="text-slate-400 text-xs mt-0.5"
         x-text="vista==='expedientes'
           ? totalExp + ' expedientes · ' + (stats.total||0) + ' total'
           : abogados.length + ' abogados encontrados'">
      </p>
    </div>
    <!-- Stats resumen en header -->
    <div class="flex items-center gap-5 text-sm">
      <div class="text-center">
        <div class="font-bold text-slate-800" x-text="stats.si ?? '—'"></div>
        <div class="text-xs text-green-600">Presenta</div>
      </div>
      <div class="w-px h-6 bg-slate-200"></div>
      <div class="text-center">
        <div class="font-bold text-slate-800" x-text="stats.no ?? '—'"></div>
        <div class="text-xs text-red-500">No presenta</div>
      </div>
      <div class="w-px h-6 bg-slate-200"></div>
      <div class="text-center">
        <div class="font-bold text-slate-800" x-text="stats.total ?? '—'"></div>
        <div class="text-xs text-slate-400">Total</div>
      </div>
    </div>
  </header>

  <!-- ── STATS CARDS ──────────────────────────────────────────────────────── -->
  <div class="grid grid-cols-4 gap-3 px-5 py-3 border-b border-slate-200 flex-shrink-0"
       style="background:#f8fafc">
    <div class="stat-card">
      <div class="num text-slate-800" x-text="stats.total ?? '—'"></div>
      <div class="lbl">Total expedientes</div>
    </div>
    <div class="stat-card" style="border-color:rgba(34,197,94,.25)">
      <div class="num text-green-600" x-text="stats.si ?? '—'"></div>
      <div class="lbl">Caja se presenta · <span class="text-green-600" x-text="(stats.pct_si||0)+'%'"></span></div>
    </div>
    <div class="stat-card" style="border-color:rgba(239,68,68,.25)">
      <div class="num text-red-500" x-text="stats.no ?? '—'"></div>
      <div class="lbl">No se presenta · <span class="text-red-500" x-text="(stats.pct_no||0)+'%'"></span></div>
    </div>
    <div class="stat-card" x-show="vista==='expedientes'" style="border-color:rgba(234,179,8,.25)">
      <div class="num text-amber-600" x-text="stats.error ?? '—'"></div>
      <div class="lbl">Error / Pendiente</div>
    </div>
    <div class="stat-card" x-show="vista==='abogados'" style="border-color:rgba(201,165,62,.25)">
      <div class="num" style="color:#c9a53e" x-text="abogados.length"></div>
      <div class="lbl">Abogados únicos</div>
    </div>
  </div>

  <!-- ── BODY: tabla + panel ─────────────────────────────────────────────── -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Spinner global -->
    <div x-show="cargando" class="flex items-center justify-center w-full">
      <div class="flex flex-col items-center gap-3 text-slate-400">
        <svg class="w-8 h-8 spinner" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-opacity=".2"/>
          <path fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4l-3 3-3-3h4z"/>
        </svg>
        <span class="text-sm">Cargando datos...</span>
      </div>
    </div>

    <!-- ════════ VISTA: EXPEDIENTES ════════════════════════════════════════ -->
    <template x-if="!cargando && vista==='expedientes'">
      <div class="flex flex-1 overflow-hidden">

        <!-- Tabla expedientes -->
        <div class="flex flex-col overflow-hidden transition-all duration-300"
             :style="panelDer ? 'width:52%' : 'width:100%'">

          <!-- Filtros -->
          <div class="flex flex-col gap-2 px-4 py-2.5 border-b border-slate-200 flex-shrink-0" style="background:#f8fafc">
            <div class="flex items-center gap-2.5">
              <select x-model="filtroRes" @change="aplicarFiltros()" class="inp">
                <option value="todos">Todos los resultados</option>
                <option value="Si">✓  Se presenta</option>
                <option value="No">✗  No se presenta</option>
                <option value="error">⚠  Error / Pendiente</option>
              </select>
              <select x-model="filtroJuzgado" @change="aplicarFiltros()" class="inp flex-1">
                <option value="">Todos los juzgados</option>
                <template x-for="j in juzgadosUnicos" :key="j">
                  <option :value="j" x-text="j"></option>
                </template>
              </select>
              <select x-model="filtroSecretaria" @change="aplicarFiltros()" class="inp flex-1">
                <option value="">Todas las secretarías</option>
                <template x-for="s in secretariasUnicas" :key="s">
                  <option :value="s" x-text="s"></option>
                </template>
              </select>
              <button @click="exportarExpedientes()"
                      title="Exportar Excel con los filtros actuales"
                      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold flex-shrink-0 transition-colors"
                      style="background:rgba(34,197,94,.12);color:#15803d;border:1px solid rgba(34,197,94,.25)">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Exportar Excel
              </button>
            </div>
            <div class="relative">
              <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input x-model="filtroTxt" type="text" class="inp w-full pl-8"
                     placeholder="Buscar número, carátula, parte, abogado…"
                     @input.debounce.400ms="aplicarFiltros()"/>
            </div>
          </div>

          <!-- Tabla -->
          <div class="overflow-y-auto flex-1">
            <table class="w-full text-sm">
              <thead class="tbl-head">
                <tr>
                  <th class="text-left">Número / Año</th>
                  <th class="text-left">Actor</th>
                  <th class="text-left">Demandado</th>
                  <th class="text-center">Resultado</th>
                  <th class="text-center">Abogados</th>
                  <th class="text-left">Fuente</th>
                  <th class="text-center">Analizado</th>
                  <th class="text-center">F. Inicio</th>
                  <th class="text-center">Demanda</th>
                  <th class="text-center"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="exp in expedientesPagina" :key="exp.id">
                  <tr class="tbl-row cursor-pointer"
                      :class="panelDer?.id === exp.id && 'active'"
                      @click="panelDer = panelDer?.id===exp.id ? null : exp; confirmandoEliminar=false">
                    <td class="px-4 py-2.5 whitespace-nowrap">
                      <div class="font-mono text-slate-700 text-xs font-semibold" x-text="exp.numero + ' / ' + exp.anio"></div>
                      <div class="text-slate-400 text-xs mt-0.5 truncate max-w-[140px]"
                           x-text="(exp.caratula||'').substring(0,40)"></div>
                    </td>
                    <td class="px-4 py-2.5 text-slate-600 text-xs">
                      <span x-text="getParte(exp,'actor')" class="truncate block max-w-[160px]"></span>
                    </td>
                    <td class="px-4 py-2.5 text-slate-600 text-xs">
                      <span x-text="getParte(exp,'demandado')" class="truncate block max-w-[160px]"></span>
                    </td>
                    <td class="px-4 py-2.5 text-center">
                      <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
                            :class="{'badge-si':exp.caja_se_presenta==='Si','badge-no':exp.caja_se_presenta==='No','badge-err':!['Si','No'].includes(exp.caja_se_presenta)}"
                            x-text="exp.caja_se_presenta||'—'"></span>
                    </td>
                    <td class="px-4 py-2.5 text-center text-slate-500"
                        x-text="(exp.participantes||[]).reduce((s,p)=>s+(p.abogados||[]).length,0)"></td>
                    <td class="px-4 py-2.5 text-slate-400 text-xs truncate max-w-[120px]"
                        x-text="exp.fuente||'—'"></td>
                    <td class="px-4 py-2.5 text-slate-400 text-xs font-mono text-center"
                        x-text="(exp.fecha_analisis||'').substring(0,10)"></td>
                    <td class="px-4 py-2.5 text-slate-500 text-xs font-mono text-center"
                        x-text="exp.fecha_inicio || '—'"></td>
                    <td class="px-2 py-2.5 text-center" @click.stop>
                      <a x-show="exp.url_demanda && exp.url_demanda !== 'NINGUNA'"
                         :href="exp.url_demanda" target="_blank"
                         title="Ver demanda"
                         class="inline-flex items-center justify-center p-1 rounded hover:bg-blue-50 text-slate-400 hover:text-blue-600 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                      </a>
                      <span x-show="!exp.url_demanda || exp.url_demanda === 'NINGUNA'"
                            class="text-slate-200 text-xs">—</span>
                    </td>
                    <td class="px-2 py-2.5 text-center" @click.stop>
                      <button @click="panelDer=exp; confirmandoEliminar=true"
                              title="Eliminar"
                              class="p-1.5 rounded hover:bg-red-50 text-slate-300 hover:text-red-500 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                      </button>
                    </td>
                  </tr>
                </template>
                <tr x-show="expedientesPagina.length===0">
                  <td colspan="10" class="px-4 py-12 text-center text-slate-400 text-sm">
                    Ningún expediente coincide con el filtro.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Paginación -->
          <div class="flex items-center justify-between px-4 py-2 border-t border-slate-200 flex-shrink-0 text-xs text-slate-500" style="background:#f8fafc">
            <button @click="paginaAnterior()" :disabled="paginaActual <= 1"
                    class="px-3 py-1 rounded border border-slate-200 hover:bg-slate-100 disabled:opacity-30 disabled:cursor-not-allowed">
              ◀ Anterior
            </button>
            <span x-text="`Página ${paginaActual} de ${totalPaginas}  ·  ${totalExp} expedientes`"></span>
            <button @click="paginaSiguiente()" :disabled="paginaActual >= totalPaginas"
                    class="px-3 py-1 rounded border border-slate-200 hover:bg-slate-100 disabled:opacity-30 disabled:cursor-not-allowed">
              Siguiente ▶
            </button>
          </div>
        </div>

        <!-- Panel derecho: detalle expediente -->
        <div x-show="panelDer" class="detail-panel flex flex-col overflow-hidden"
             style="width:48%"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 translate-x-4"
             x-transition:enter-end="opacity-100 translate-x-0">

          <!-- Header panel -->
          <div class="px-5 py-4 border-b border-slate-100 flex-shrink-0">
            <div class="flex items-start justify-between">
              <div class="flex-1 min-w-0">
                <div class="font-mono font-bold text-slate-800"
                     x-text="panelDer?.numero + ' / ' + panelDer?.anio"></div>
                <div class="text-slate-500 text-xs mt-1 leading-snug"
                     x-text="panelDer?.caratula"></div>
                <div class="flex items-center gap-2 mt-2">
                  <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold"
                        :class="{'badge-si':panelDer?.caja_se_presenta==='Si','badge-no':panelDer?.caja_se_presenta==='No','badge-err':!['Si','No'].includes(panelDer?.caja_se_presenta)}"
                        x-text="'Caja: ' + (panelDer?.caja_se_presenta||'—')"></span>
                  <span class="text-xs text-slate-400 font-mono"
                        x-text="(panelDer?.fecha_analisis||'').substring(0,10)"></span>
                </div>
                <!-- Jurisdicción / Juzgado / Secretaría / Fuente -->
                <div class="mt-2 space-y-0.5" x-show="panelDer?.jurisdiccion || panelDer?.juzgado || panelDer?.fuente">
                  <div x-show="panelDer?.jurisdiccion" class="flex items-center gap-1.5 text-xs text-slate-400">
                    <span class="font-semibold text-slate-500 uppercase tracking-wide" style="font-size:.6rem">Jurisdicción</span>
                    <span x-text="panelDer?.jurisdiccion"></span>
                  </div>
                  <div x-show="panelDer?.juzgado" class="flex items-center gap-1.5 text-xs text-slate-400">
                    <span class="font-semibold text-slate-500 uppercase tracking-wide" style="font-size:.6rem">Juzgado</span>
                    <span x-text="panelDer?.juzgado"></span>
                  </div>
                  <div x-show="panelDer?.secretaria" class="flex items-center gap-1.5 text-xs text-slate-400">
                    <span class="font-semibold text-slate-500 uppercase tracking-wide" style="font-size:.6rem">Secretaría</span>
                    <span x-text="panelDer?.secretaria"></span>
                  </div>
                  <div x-show="panelDer?.fuente" class="flex items-center gap-1.5 text-xs text-slate-400">
                    <span class="font-semibold text-slate-500 uppercase tracking-wide" style="font-size:.6rem">Fuente</span>
                    <span x-text="panelDer?.fuente"></span>
                  </div>
                  <div x-show="panelDer?.fecha_inicio" class="flex items-center gap-1.5 text-xs text-slate-400">
                    <span class="font-semibold text-slate-500 uppercase tracking-wide" style="font-size:.6rem">F. Inicio</span>
                    <span class="font-mono" x-text="panelDer?.fecha_inicio"></span>
                  </div>
                  <div x-show="panelDer?.url_demanda && panelDer?.url_demanda !== 'NINGUNA'"
                       class="flex items-center gap-1.5 text-xs">
                    <span class="font-semibold text-slate-500 uppercase tracking-wide" style="font-size:.6rem">Demanda</span>
                    <a :href="panelDer?.url_demanda" target="_blank"
                       class="flex items-center gap-1 text-blue-500 hover:text-blue-700 transition-colors">
                      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

<!-- ═══════════════════════ JAVASCRIPT ════════════════════════════════════ -->
<script>
function app() {
  return {
    vista: 'expedientes',
    expedientesPagina: [],
    totalExp: 0,
    paginaActual: 1,
    porPagina: 50,
    stats: { total:0, si:0, no:0, error:0, pct_si:0, pct_no:0, juzgados:[], secretarias:[] },
    cargando: true,
    cargandoAb: false,
    panelDer: null,

    // Expedientes
    filtroRes: 'todos',
    filtroTxt: '',
    filtroJuzgado: '',
    filtroSecretaria: '',
    confirmandoEliminar: false,

    // Abogados
    abogados: [],
    filtroAb: '',
    filtroRepresenta: '',
    ordenAb: 'total',

    /* ── Init ── */
    async init() {
      await this.cargar();
    },

    async cargar() {
      this.cargando = true;
      this.panelDer = null;
      try {
        this.stats = await fetch('/api/stats').then(r => r.json());
        await this.cargarExpedientes();
      } catch (err) { console.error(err); }
      this.cargando = false;
    },

    async cargarExpedientes() {
      const p = new URLSearchParams({ pagina: this.paginaActual, por_pagina: this.porPagina });
      if (this.filtroRes !== 'todos') p.set('resultado', this.filtroRes);
      if (this.filtroJuzgado)         p.set('juzgado', this.filtroJuzgado);
      if (this.filtroSecretaria)      p.set('secretaria', this.filtroSecretaria);
      if (this.filtroTxt)             p.set('busqueda', this.filtroTxt);
      const data = await fetch('/api/expedientes?' + p).then(r => r.json());
      this.expedientesPagina = data.items;
      this.totalExp = data.total;
    },

    async cargarAbogados() {
      this.cargandoAb = true;
      try {
        const p = new URLSearchParams();
        if (this.filtroAb)         p.set('filtro_ab', this.filtroAb);
        if (this.filtroRepresenta) p.set('filtro_representa', this.filtroRepresenta);
        let r = await fetch('/api/abogados?' + p).then(r => r.json());
        if (this.ordenAb === 'nombre') r = [...r].sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
        else if (this.ordenAb === 'si') r = [...r].sort((a,b) => b.si - a.si);
        this.abogados = r;
      } catch (err) { console.error(err); }
      this.cargandoAb = false;
    },

    async aplicarFiltros() {
      this.paginaActual = 1;
      await this.cargarExpedientes();
    },

    get totalPaginas() { return Math.max(1, Math.ceil(this.totalExp / this.porPagina)); },

    async paginaAnterior() {
      if (this.paginaActual > 1) { this.paginaActual--; await this.cargarExpedientes(); }
    },
    async paginaSiguiente() {
      if (this.paginaActual < this.totalPaginas) { this.paginaActual++; await this.cargarExpedientes(); }
    },

    /* ── Dropdowns desde stats ── */
    get juzgadosUnicos()    { return this.stats.juzgados    || []; },
    get secretariasUnicas() { return this.stats.secretarias || []; },

    /* Devuelve el nombre de la primera parte que coincide con el tipo buscado */
    getParte(exp, tipo) {
      const p = (exp.participantes||[]).find(p => (p.tipo||'').toLowerCase().includes(tipo));
      if (!p || !p.nombre) return '—';
      return p.nombre.length > 32 ? p.nombre.substring(0, 32) + '…' : p.nombre;
    },

    /* ── Exportar a Excel ── */
    exportarExpedientes() {
      const p = new URLSearchParams();
      if (this.filtroRes !== 'todos') p.set('resultado', this.filtroRes);
      if (this.filtroJuzgado)         p.set('juzgado', this.filtroJuzgado);
      if (this.filtroSecretaria)      p.set('secretaria', this.filtroSecretaria);
      if (this.filtroTxt)             p.set('busqueda', this.filtroTxt);
      window.location.href = '/api/exportar?' + p.toString();
    },

    exportarAbogados() {
      const p = new URLSearchParams();
      if (this.filtroAb)         p.set('filtro_ab', this.filtroAb);
      if (this.filtroRepresenta) p.set('filtro_representa', this.filtroRepresenta);
      window.location.href = '/api/exportar?' + p.toString();
    },

    /* ── Eliminar expediente ── */
    async eliminarExpediente(id) {
      const r = await fetch(`/api/expedientes/${id}`, { method: 'DELETE' });
      if (!r.ok) { alert('Error al eliminar'); return; }
      this.panelDer = null;
      this.confirmandoEliminar = false;
      this.stats = await fetch('/api/stats').then(r => r.json());
      await this.cargarExpedientes();
    },

  };
}
</script>
