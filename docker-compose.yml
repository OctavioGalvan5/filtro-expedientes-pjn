services:

  chrome:
    image: selenium/standalone-chrome:4.27.0-20250203
    shm_size: '2gb'
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_SESSION_REQUEST_TIMEOUT=300
    restart: unless-stopped

  pjn-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DOCKER_ENV=1
      - SELENIUM_HUB_URL=http://chrome:4444/wd/hub
      - PJN_USUARIO=${PJN_USUARIO}
      - PJN_PASSWORD=${PJN_PASSWORD}
    depends_on:
      - chrome
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
