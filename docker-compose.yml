services:
  pjn-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DOCKER_ENV=1
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
      - CHROME_BIN=/usr/bin/chromium
      - PJN_USUARIO=${PJN_USUARIO}
      - PJN_PASSWORD=${PJN_PASSWORD}
    restart: unless-stopped
    shm_size: '256mb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
